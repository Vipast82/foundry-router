<!doctype html>
<!--
  Foundry Router admin panel.
  Stack choice: one static HTML file, vanilla JS, zero build toolchain — the
  best maintainability-per-dependency for a small internal admin surface.
  Served by the same FastAPI app at /ui; talks to /admin/api/*.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foundry Router</title>
<style>
  /* Molten-metal palette (matches the Foundry Enterprises logo). Dark is the
     default; [data-theme="light"] (set by the header toggle, remembered in
     localStorage) swaps to the logo's white-field look. Pill backgrounds are
     variables too, so status chips read correctly in both themes. */
  :root {
    color-scheme: dark;
    --bg:#15120e; --panel:#201b15; --line:#33291f; --fg:#e8e3da; --dim:#9a8f80;
    --accent:#ff8a1e; --accent-2:#ffb347;
    --ok:#66c06f; --bad:#e0574f; --warn:#e0a441;
    --ok-bg:#1b3320; --bad-bg:#3a1e1c; --warn-bg:#38301a;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg:#f6f2ec; --panel:#ffffff; --line:#e4ddd1; --fg:#2a2622; --dim:#6f675b;
    --accent:#d9741a; --accent-2:#e8912f;
    --ok:#2f8f43; --bad:#c23b32; --warn:#b07817;
    --ok-bg:#e3f2e5; --bad-bg:#fbe4e2; --warn-bg:#faefd8;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.45 system-ui, "Segoe UI", sans-serif;
         transition:background .15s ease, color .15s ease; }
  /* Header/nav/main share fluid side padding that grows with the viewport, so
     content fills an ultrawide screen instead of being capped at a fixed width. */
  header { display:flex; align-items:center; gap:14px;
           padding:9px clamp(12px, 1.8vw, 44px);
           background:var(--panel); border-bottom:1px solid var(--line); }
  header .brand { display:flex; flex-direction:column; min-width:0; }
  header h1 { font-size:16px; margin:0; color:var(--accent); font-weight:600; }
  header .sub { color:var(--dim); font-size:12px; }
  #brand-logo { height:36px; width:auto; max-width:180px; border-radius:5px; }
  .hdr-tools { margin-left:auto; display:flex; gap:6px; align-items:center;
               flex-wrap:wrap; justify-content:flex-end; }
  nav { display:flex; gap:2px; padding:0 clamp(6px, 1.8vw, 40px);
        background:var(--panel); border-bottom:1px solid var(--line); flex-wrap:wrap; }
  nav button { background:none; border:none; color:var(--dim); padding:9px 13px;
               cursor:pointer; font-size:13px; border-bottom:2px solid transparent; }
  nav button:hover { color:var(--fg); }
  nav button.active { color:var(--fg); border-bottom-color:var(--accent); }
  main { padding:18px clamp(12px, 1.8vw, 44px); width:100%; }
  h2 { font-size:14px; margin:18px 0 8px; color:var(--accent); }
  .hint { color:var(--dim); font-size:12px; margin:4px 0 10px; }
  table { border-collapse:collapse; width:100%; margin:6px 0 14px; font-size:13px; }
  th,td { text-align:left; padding:6px 9px; border-bottom:1px solid var(--line);
          vertical-align:top; }
  /* Long model ids/URLs may break anywhere, but headers must never split
     mid-word ("person/a", "ste/ps") — headers stay on one line and the
     table scrolls horizontally inside <main> if it gets too wide. */
  td { word-break:break-word; }
  th { color:var(--dim); font-weight:500; white-space:nowrap; }
  .nw { white-space:nowrap; word-break:normal; }
  .pill { display:inline-block; padding:1px 8px; border-radius:9px; font-size:11px;
          white-space:nowrap; }
  .ok  { background:var(--ok-bg); color:var(--ok); }
  .bad { background:var(--bad-bg); color:var(--bad); }
  .warn{ background:var(--warn-bg); color:var(--warn); }
  button.act { background:var(--panel); color:var(--fg); border:1px solid var(--line);
               border-radius:5px; padding:5px 11px; cursor:pointer; font-size:12px;
               white-space:nowrap; }
  button.act:hover { border-color:var(--accent); }
  button.act:disabled { opacity:.35; cursor:not-allowed; }
  button.act:disabled:hover { border-color:var(--line); }
  button.primary { border-color:var(--accent); color:var(--accent); }
  input, select, textarea { background:var(--bg); color:var(--fg);
    border:1px solid var(--line); border-radius:5px; padding:5px 8px; font-size:13px; }
  textarea { width:100%; font-family:ui-monospace, monospace; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:6px 0; }
  .row label { color:var(--dim); font-size:12px; min-width:170px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px;
          padding:12px 14px; margin:10px 0; }
  code, .mono { font-family:ui-monospace, Consolas, monospace; font-size:12px; }
  #toast { position:fixed; bottom:16px; right:16px; background:var(--panel);
           border:1px solid var(--accent); padding:9px 14px; border-radius:6px;
           display:none; z-index:9; }
  details summary { cursor:pointer; color:var(--dim); }
  /* Per-request MCP tool trail. The old rendering forced every call onto one
     nowrap line, so a long line (e.g. a 429 URL) was clipped no matter the
     window size. This wraps and indents each call under the row instead. */
  .trail { margin:4px 0 2px; padding-left:2px; border-left:2px solid var(--line);
           display:flex; flex-direction:column; gap:2px; }
  .trail .call { font-family:ui-monospace, Consolas, monospace; font-size:11.5px;
           white-space:normal; word-break:break-word; padding-left:7px; color:var(--fg); }
  .trail .call .err { color:var(--bad); }
  /* Persona MCP-tool selector: a live checklist replacing the old raw-JSON
     input, populated from the same discovered set the Tools tab shows. */
  .mcp-checklist { display:flex; flex-direction:column; gap:1px; flex:1;
    min-width:280px; max-height:180px; overflow-y:auto; padding:6px 8px;
    border:1px solid var(--line); border-radius:5px; background:var(--bg); }
  .mcp-item { display:flex; align-items:center; gap:7px; color:var(--fg);
    padding:2px 0; min-width:0; }
  .mcp-item.disabled { opacity:.5; }
  .mcp-item input { flex:none; }
  .mcp-item .hint { white-space:nowrap; }
  /* Wide tables scroll inside their own box (added by wrapTables) so the page
     body never scrolls sideways. */
  .tscroll { overflow-x:auto; -webkit-overflow-scrolling:touch; margin:6px 0 14px;
             max-width:100%; }
  .tscroll table { margin:0; }
  /* Numeric steppers: every number input is wrapped (enhanceSteppers) into a
     [-][value][+] control with hold-to-repeat, and still typeable. */
  .stepper { display:inline-flex; align-items:stretch; border:1px solid var(--line);
             border-radius:5px; overflow:hidden; background:var(--bg); vertical-align:middle; }
  .stepper input[type="number"] { border:0; border-radius:0; text-align:center;
             width:5.5em; background:transparent; -moz-appearance:textfield; margin:0; }
  .stepper input[type="number"]::-webkit-outer-spin-button,
  .stepper input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .step-btn { border:0; background:var(--panel); color:var(--fg); cursor:pointer;
             padding:0 11px; font-size:16px; line-height:1; user-select:none;
             -webkit-user-select:none; touch-action:none; }
  .step-btn:hover { background:var(--accent); color:#1a1206; }
  .step-btn:active { filter:brightness(.9); }
  /* Dev-log rows: time / level / logger / message on one wrapping line, with an
     expandable traceback spanning the full width below. */
  .dev-rec { display:flex; flex-wrap:wrap; gap:8px; align-items:baseline;
             padding:5px 2px; border-bottom:1px solid var(--line); font-size:13px; }
  .dev-rec details, .dev-rec pre { flex-basis:100%; }
  .dev-rec pre { background:var(--bg); border:1px solid var(--line); border-radius:5px;
                 padding:8px; overflow:auto; max-height:340px; white-space:pre-wrap;
                 word-break:break-word; margin:4px 0 2px; }
  /* -- Responsive: PC / tablet / phone ---------------------------------------- */
  @media (max-width: 900px) {
    header { flex-wrap:wrap; gap:4px 12px; padding:9px 12px; }
    main { padding:14px 12px; }
    .row label { min-width:0; }        /* 170px labels would force overflow */
    .card { padding:10px 11px; }
    th, td { padding:5px 7px; }
    table { font-size:12px; }
  }
  @media (max-width: 560px) {
    header h1 { font-size:15px; }
    header .sub { width:100%; }         /* version/pool/brain drop to their own line */
    nav { padding:0 6px; }
    nav button { padding:8px 9px; font-size:12px; }
    main { padding:12px 9px; }
    .row { gap:6px; }
    .row input, .row select { flex:1; min-width:120px; }
    table { font-size:11.5px; }
    th, td { padding:5px 6px; }
  }
</style>
</head>
<body>
<header>
  <img id="brand-logo" alt="" hidden>
  <div class="brand">
    <h1>Foundry Router</h1>
    <span class="sub" id="hdr-info">loading…</span>
  </div>
  <div class="hdr-tools">
    <button class="act" id="logo-btn" title="Upload or change the header logo (PNG/SVG, under 512 KB)">Logo…</button>
    <button class="act" id="logo-clear" title="Remove the custom logo" hidden>✕</button>
    <button class="act" id="theme-btn" title="Toggle light / dark theme">🌙 Dark</button>
  </div>
  <input type="file" id="logo-file" accept="image/*" hidden>
</header>
<nav id="nav"></nav>
<main id="main"></main>
<div id="toast"></div>

<script>
"use strict";
const $ = (s, el=document) => el.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function api(path, opts={}) {
  const r = await fetch("/admin/api/" + path, {
    headers: {"Content-Type": "application/json"}, ...opts,
    body: opts.body !== undefined ? JSON.stringify(opts.body) : undefined,
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}
function toast(msg, isErr=false) {
  const t = $("#toast");
  t.textContent = msg; t.style.borderColor = isErr ? "var(--bad)" : "var(--accent)";
  t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 3500);
}
const formatCtx = n => n >= 1000 ? Math.round(n / 1000) + 'K' : String(n);
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
const run = p => p.then(d => { toast("Saved"); render(); return d; })
                  .catch(e => toast(e.message, true));

// Clear a log table (usage/events) after confirmation, then re-render the tab.
function clearLog(kind, label) {
  if (!confirm(`Permanently delete all ${label}? This cannot be undone.`)) return;
  api(kind + "/clear", { method: "POST" })
    .then(r => { toast(`Cleared ${r.removed} row(s)`); render(); })
    .catch(e => toast(e.message, true));
}

/* ------------------------------------------------------------------ tabs -- */
const TABS = {
  "Backends":  tabBackends,  "Models":   tabModels,   "Personas": tabPersonas,
  "Tools":     tabTools,     "Guardrails": tabGuardrails, "MCP":  tabMCP,
  "Ollama":    tabOllama,   "Research": tabResearch,  "Evals": tabEvals,
  "Usage Log": tabUsage,     "Events":   tabEvents,   "Dev Log": tabDevLog,
};
let current = "Backends";
function render() {
  const nav = $("#nav"); nav.innerHTML = "";
  for (const name of Object.keys(TABS)) {
    const b = document.createElement("button");
    b.textContent = name; b.className = name === current ? "active" : "";
    b.onclick = () => { current = name; render(); };
    nav.appendChild(b);
  }
  $("#main").innerHTML = "<p class='hint'>loading…</p>";
  TABS[current]().then(postRender).catch(e => $("#main").innerHTML =
    `<p class="hint">failed to load: ${esc(e.message)}</p>`);
}

// Wrap every rendered table in a horizontal-scroll box so a wide table scrolls
// inside its own container on narrow screens instead of forcing the whole page
// to scroll sideways. One place, so no tab has to remember to do it.
function wrapTables() {
  for (const t of $("#main").querySelectorAll("table")) {
    if (t.parentElement && t.parentElement.classList.contains("tscroll")) continue;
    const w = document.createElement("div");
    w.className = "tscroll";
    t.replaceWith(w);
    w.appendChild(t);
  }
}

// Nudge a number input by one step within its min/max, firing input/change so
// any live handler (e.g. a Save that reads .value) sees it.
function stepValue(inp, dir) {
  const step = parseFloat(inp.step) || 1;
  const min = inp.min !== "" ? parseFloat(inp.min) : -Infinity;
  const max = inp.max !== "" ? parseFloat(inp.max) : Infinity;
  let v = parseFloat(inp.value);
  if (isNaN(v)) v = 0;
  v = Math.min(max, Math.max(min, +(v + dir * step).toFixed(6)));
  inp.value = v;
  inp.dispatchEvent(new Event("input", {bubbles: true}));
  inp.dispatchEvent(new Event("change", {bubbles: true}));
}
// Press = one step; hold = ramp (after 400ms, every 80ms). Mouse + touch.
function bindHold(btn, fn) {
  let delay, repeat;
  const start = e => {
    e.preventDefault();
    fn();
    delay = setTimeout(() => { repeat = setInterval(fn, 80); }, 400);
  };
  const stop = () => { clearTimeout(delay); clearInterval(repeat); };
  btn.addEventListener("mousedown", start);
  btn.addEventListener("touchstart", start, {passive: false});
  ["mouseup", "mouseleave", "touchend", "touchcancel"].forEach(ev => btn.addEventListener(ev, stop));
}
// One place, like wrapTables: turn every number input into a [-][value][+]
// stepper. The input element (and its id) is preserved, so every existing
// read-by-id save handler keeps working.
function enhanceSteppers() {
  for (const inp of $("#main").querySelectorAll('input[type="number"]')) {
    if (inp.closest(".stepper")) continue;
    const wrap = document.createElement("span");
    wrap.className = "stepper";
    inp.replaceWith(wrap);
    const mk = (txt, dir) => {
      const b = document.createElement("button");
      b.type = "button"; b.className = "step-btn"; b.textContent = txt; b.tabIndex = -1;
      bindHold(b, () => stepValue(inp, dir));
      return b;
    };
    wrap.append(mk("−", -1), inp, mk("+", +1));
  }
}
function postRender() { wrapTables(); enhanceSteppers(); }

/* -------------------------------------------------------------- backends -- */
async function tabBackends() {
  const st = await api("status");
  const bh = st.brain.health || {};
  const bhCls = bh.healthy === true ? (bh.model_present === false ? "warn" : "ok")
              : bh.healthy === false ? "bad" : "";
  const bhTxt = bh.healthy === true ? (bh.model_present === false ? "model missing" : "healthy")
              : bh.healthy === false ? "DOWN" : "…";
  $("#hdr-info").innerHTML =
    `v${esc(st.version)} · pool: ${esc(st.pool_mode)} · brain: ${esc(st.brain.model)} `
    + `(${esc(st.brain.provider)}) <span class="pill ${bhCls}" title="${esc(bh.error || "")}">brain: ${bhTxt}</span>`
    + ` · ${st.tool_count} tools`;
  const rows = st.backends.map(b => `<tr>
      <td class="nw">${esc(b.name)}</td><td class="mono nw">${esc(b.type)}</td>
      <td class="mono">${esc(b.url)}</td><td>${b.priority}</td>
      <td><span class="pill ${b.healthy ? "ok" : "bad"}">${b.healthy ? "healthy" : "down"}</span></td>
      <td class="mono">${(b.models || []).slice(0, 8).map(esc).join(", ")}${(b.models||[]).length > 8 ? "…" : ""}</td>
      <td class="mono">${esc(b.last_error || "")}</td>
      <td class="nw"><button class="act" onclick='testBackend(${JSON.stringify(b.name)})'>test</button>
        <span class="bk-status" data-bk="${esc(b.name)}"></span></td></tr>`).join("");
  window.testBackend = async name => {
    const el = [...document.querySelectorAll(".bk-status")].find(x => x.dataset.bk === name);
    if (el) el.textContent = "probing…";
    try {
      const r = await api("backends/test", {method: "POST", body: {name}});
      if (!el) return;
      el.innerHTML = r.ok
        ? `<span class="pill ok" title="${esc((r.sample || []).join(", "))}">reachable · ${r.models} models · ${r.latency_ms}ms</span>`
        : `<span class="pill bad" title="${esc(r.error)}">unreachable</span>`;
      if (!r.ok) toast(name + ": " + r.error, true);
    } catch (e) { if (el) el.innerHTML = '<span class="pill bad">error</span>'; toast(e.message, true); }
  };
  $("#main").innerHTML = `
    <h2>Backend Pool — mode: ${esc(st.pool_mode)}</h2>
    <p class="hint">Health flips only after repeated failures (removal grace period). Use <b>test</b>
      for an immediate free liveness probe (lists the backend's models — no generation).</p>
    <table><tr><th>name</th><th>type</th><th>url</th><th>prio</th><th>health</th><th>models</th><th>last error</th><th></th></tr>${rows}</table>
    <div class="row"><button class="act" id="test-meridian"
      title="Free read-only probe of Meridian's quota endpoint — answers 'is the Claude subscription login still valid' without burning a real generation">Test Meridian Auth</button>
      <span id="meridian-health" class="hint"></span></div>
    <div class="card">
      <h2 style="margin-top:0">Edit backend list (internal mode)</h2>
      <p class="hint">JSON list. Use <code>\${MERIDIAN_API_KEY}</code>-style references for api_key —
      the value is written into config.yaml verbatim. Saving rebuilds the pool live.</p>
      <textarea id="backends-json" rows="12"></textarea>
      <div class="row"><button class="act primary" id="save-backends">Save backends</button>
      <select id="pool-mode">
        ${["internal","olla","litellm"].map(m =>
          `<option ${m === st.pool_mode ? "selected" : ""}>${m}</option>`).join("")}
      </select>
      <button class="act" id="save-mode">Switch pool mode</button></div>
    </div>
    <div class="card">
      <h2 style="margin-top:0">Agent Brain</h2>
      <p class="hint">The model that makes routing decisions on every request (design doc §4.2).</p>
      <div class="row"><label>provider</label>
        <select id="brain-provider">${["ollama","meridian","openrouter"].map(p =>
          `<option ${p === st.brain.provider ? "selected" : ""}>${p}</option>`).join("")}</select>
        <label>endpoint</label><input id="brain-endpoint" size="34" value="${esc(st.brain.endpoint)}">
        <label>model</label><input id="brain-model" size="24" value="${esc(st.brain.model)}"></div>
      <div class="row"><button class="act" id="test-brain"
        title="Free reachability probe of the brain endpoint (GET its model list — no generation). The brain runs on EVERY request; if it's down, routing silently degrades to the static fallback rule.">Test brain</button>
        <span id="brain-health" class="hint"></span></div>
      <p class="hint">Context budget — size these to the brain's real headroom (a 6GB local
      brain with num_ctx ~6144 has ~1500 tokens free after system prompt + tool schemas;
      a Claude-class brain can take far more). Tool-result limits only cap the preview the
      brain sees — the full output still reaches the user via use_last_result. Applies live.</p>
      <div class="row">
        <label>tool_result_limit_chars</label><input id="brain-trl" type="number" size="8">
        <label>mcp_result_limit_chars</label><input id="brain-mrl" type="number" size="8">
        <label>worker_max_tokens</label><input id="brain-wmt" type="number" size="8">
        <label title="Caps what the brain sees of a large pasted user message before routing — the worker still receives the complete original (include_full_user_message)">user_input_preview_chars</label>
        <input id="brain-uip" type="number" size="8">
        <label title="While a worker/brain/MCP call is in flight, emit a 'still working' narration line every N seconds so reverse proxies and clients never mistake a slow request (failover + cold model load) for a dead one. 0 disables.">heartbeat_seconds</label>
        <input id="brain-hb" type="number" size="6">
        <button class="act primary" id="save-brain">Save brain</button></div>
    </div>`;
  const cfg = await api("config");
  $("#backends-json").value =
    JSON.stringify(cfg.backend_pool.internal.backends, null, 2);
  $("#brain-trl").value = cfg.agent_brain.tool_result_limit_chars;
  $("#brain-mrl").value = cfg.agent_brain.mcp_result_limit_chars;
  $("#brain-wmt").value = cfg.agent_brain.worker_max_tokens;
  $("#brain-uip").value = cfg.agent_brain.user_input_preview_chars;
  $("#brain-hb").value = cfg.agent_brain.heartbeat_seconds;
  const renderBrainHealth = h => {
    const el = $("#brain-health"); h = h || {};
    if (h.healthy === true) {
      el.innerHTML = '<span class="pill ok">healthy</span> ' + esc(h.model || "")
        + (h.model_present === false
            ? ' <span class="pill warn" title="endpoint is up but the configured model is not present — pull it on the brain host">model not loaded</span>' : '')
        + (h.checked_at ? ' · checked ' + esc(String(h.checked_at).slice(11, 19)) + "Z" : '');
    } else if (h.healthy === false) {
      el.innerHTML = '<span class="pill bad">DOWN</span> ' + esc(h.error || "unreachable")
        + '<br><span class="hint">every request is degrading to the static fallback rule until this recovers</span>';
    } else {
      el.innerHTML = '<span class="hint">not probed yet — click Test brain</span>';
    }
  };
  renderBrainHealth(st.brain.health);
  $("#test-brain").onclick = async () => {
    $("#brain-health").textContent = "probing…";
    try { renderBrainHealth(await api("brain/health")); }
    catch (e) { $("#brain-health").innerHTML = '<span class="pill bad">error</span> ' + esc(e.message); }
  };
  $("#test-meridian").onclick = async () => {
    const el = $("#meridian-health");
    el.textContent = "checking…";
    try {
      const r = await api("meridian/health");
      if (!r.backends.length) {
        el.textContent = "no anthropic-compatible backend configured";
        return;
      }
      el.innerHTML = r.backends.map(b =>
        `${esc(b.backend)}: ` + (b.valid
          ? '<span class="pill ok">auth valid</span>'
          : '<span class="pill bad">auth stale/invalid</span>')
        + ` <span class="hint">${esc(b.error || b.note || "")}${b.oauth_ok === false
          ? " — oauth source NULL; on the host run: meridian profile login &lt;profile&gt; --headless"
          : ""}</span>`).join("<br>");
    } catch (e) { el.textContent = e.message; }
  };
  $("#save-backends").onclick = () =>
    run(api("config/backends", {method: "POST", body: JSON.parse($("#backends-json").value)}));
  $("#save-mode").onclick = () =>
    run(api("config/pool_mode", {method: "POST", body: {mode: $("#pool-mode").value}}));
  $("#save-brain").onclick = () =>
    run(api("config/brain", {method: "POST", body: {
      provider: $("#brain-provider").value, endpoint: $("#brain-endpoint").value,
      model: $("#brain-model").value,
      tool_result_limit_chars: +$("#brain-trl").value,
      mcp_result_limit_chars: +$("#brain-mrl").value,
      worker_max_tokens: +$("#brain-wmt").value,
      user_input_preview_chars: +$("#brain-uip").value,
      heartbeat_seconds: +$("#brain-hb").value}}));
}

/* ---------------------------------------------------------------- models -- */
const parseTags = s => { try { const t = JSON.parse(s || "[]"); return Array.isArray(t) ? t : []; } catch (e) { return []; } };
const RESEARCH_PILL = {queued: "warn", running: "warn", ok: "ok", failed: "bad"};

async function tabModels() {
  const d = await api("models");
  const isEnabled = m => m.enabled === null || m.enabled === undefined || !!m.enabled;
  const rBtn = m => d.research_ready
    ? `<button class="act" onclick='doResearch(${JSON.stringify(m.id)})'>research</button>`
    : `<button class="act" disabled title="${esc(d.research_reason)}">research</button>`;
  const rowHtml = m => `<tr${isEnabled(m) ? "" : ' style="opacity:.45"'}>
    <td class="mono">${esc(m.id)} ${m.reachable ? '<span class="pill ok">live</span>' : ""}${m.embedding ? ' <span class="pill warn" title="embedding-only model — excluded from chat routing (can\'t serve /api/chat)">embedding</span>' : ""}</td>
    <td class="nw">${esc(m.relative_cost_tier ?? "")}</td>
    <td>${esc(parseTags(m.tags).join(", "))}${m.content_policy === "permissive" ? ' <span class="pill warn">permissive</span>' : ""}</td>
    <td>${esc(m.good_for ?? "")}</td>
    <td class="nw">${m.research_status
      ? `<span class="pill ${RESEARCH_PILL[m.research_status] || "warn"}" title="${esc(m.research_note || "")}">${esc(m.research_status)}</span>` : ""}</td>
    <td class="mono nw">${esc(m.source ?? "")}</td>
    <td class="nw"><button class="act" onclick='toggleModel(${JSON.stringify(m.id)}, ${isEnabled(m) ? "false" : "true"})'>
        ${isEnabled(m) ? "disable" : "enable"}</button>
        <button class="act" onclick='editModel(${JSON.stringify(m.id)})'>edit</button>
        ${rBtn(m)}</td>
    </tr>`;
  const header = "<tr><th>model</th><th>tier</th><th>tags</th><th>good for</th><th>research</th><th>source</th><th></th></tr>";
  const renderTables = () => {
    const q = ($("#model-search")?.value || "").toLowerCase();
    const match = m => !q ||
      (m.id + " " + (m.tags || "") + " " + (m.good_for || "") + " " +
       (m.relative_cost_tier || "")).toLowerCase().includes(q);
    const live = d.models.filter(m => m.reachable && match(m));
    const known = d.models.filter(m => !m.reachable && match(m));
    $("#live-count").textContent = live.length;
    $("#known-count").textContent = known.length;
    $("#live-table").innerHTML = header + live.map(rowHtml).join("");
    $("#known-table").innerHTML = header + known.map(rowHtml).join("");
  };
  $("#main").innerHTML = `
    <h2>Model Registry</h2>
    <p class="hint">Edits made here are pinned as manual_override — automatic refreshes
    supplement but never replace them (§4.4). Local models are tagged tier
    <b>free</b> automatically at discovery; tags/policy are name-seeded,
    reference-seeded, and research-refined. Disabling a model excludes it from
    the brain's candidates and tools entirely (governance, not capability).${d.research_ready ? "" :
      ` <b>Research is unavailable:</b> ${esc(d.research_reason)}.`}</p>
    <div class="row">
      <input id="model-search" size="34" placeholder="filter by id, tag, tier, good_for…">
      <button class="act primary" onclick="run(api('models/refresh',{method:'POST'}))">Poll OpenRouter now</button>
      <button class="act" title="Fill tags/good_for/estimated scores for known model families (never overwrites manual edits or real research)"
        onclick="api('models/seed',{method:'POST'}).then(r=>{toast('Reference seed applied to '+r.applied+' models');render()}).catch(e=>toast(e.message,true))">Apply reference seed</button>
    </div>
    <h2>Live / Available (<span id="live-count"></span>) — reachable through a configured backend right now</h2>
    <table id="live-table"></table>
    <h2>Known catalog (<span id="known-count"></span>) — discovered but not currently reachable; reference material</h2>
    <table id="known-table"></table>
    <div class="card" id="model-editor" style="display:none">
      <h2 style="margin-top:0">Edit <span id="me-id" class="mono"></span></h2>
      <div class="row"><label>relative_cost_tier</label>
        <select id="me-tier"><option value="">-</option><option>free</option>
        <option>low</option><option>medium</option><option>high</option><option>very_high</option></select>
        <label>content_policy</label>
        <select id="me-policy"><option value="">-</option>
        <option>standard</option><option>permissive</option></select></div>
      <div class="row"><label>tags (comma-separated)</label><input id="me-tags" size="60"
        placeholder="coding, vision, tool-calling, reasoning, creative-writing, long-context"></div>
      <div class="row"><label>good_for</label><input id="me-good" size="60"></div>
      <div class="row"><label>reasoning_style</label><input id="me-style" size="60"></div>
      <div class="row"><label>benefits_from_explicit_prompting</label>
        <input type="checkbox" id="me-refine"></div>
      <div class="row"><label>tool-calling reliability</label>
        <span id="me-reliability" class="hint"></span></div>
      <div class="row"><label title="Live benchmark rows. A ⚠ marks two categories sharing the exact same score — the signature of an extractor conflating them; reset to clear it.">benchmark rows</label>
        <span id="me-benchmarks" class="hint">…</span></div>
      <p class="hint" style="margin:0 0 6px">
        Unflagged = passed integrity checks. <span class="pill bad" style="border:1px solid var(--line)">red ⚠</span>
        = demoted by the conflation guard: the same score was written to two or more
        categories in one research pass, so it's treated as synthesized (not a real
        per-category measurement) and its confidence is cut. Hover a pill for its
        source/type/confidence, timestamp, and which category it collided with.</p>
      <div class="row"><label title="Real, named, independently-verifiable benchmarks (SWE-Bench, MMLU, BFCL, ...). Kept separate from the composite; used as an explicit tiebreaker when composite scores are near-equal. percent-scale rows break ties; elo/count/score scales are stored but flagged out of naive comparison. ✎ = manually entered (never overwritten by research); ✕ removes a row.">named benchmarks</label>
        <span id="me-named" class="hint">…</span></div>
      <div class="row"><label title="Add real vendor data the research pipeline hasn't captured yet (e.g. a brand-new source page). Stored as source=manual so a later research pass never clobbers it.">add named benchmark</label>
        <input id="nb-name" placeholder="SWE-Bench Verified" size="18">
        <select id="nb-cat"><option>coding</option><option>reasoning</option><option>general_chat</option><option>tool_calling</option><option>agentic</option></select>
        <input id="nb-score" placeholder="75.6" size="6">
        <select id="nb-scale"><option>percent</option><option>elo</option><option>count</option><option>score</option></select>
        <input id="nb-url" placeholder="https://source" size="16">
        <button class="act" id="nb-add">Add</button></div>
      <div class="row"><button class="act primary" id="me-save">Save (manual override)</button>
        <button class="act" id="me-reset-bench" title="Delete this model's automatic benchmark rows (research/seed/observed; manual overrides kept) and re-apply reference-seed defaults — the fix for a row with a wrong number">Reset scores to seed</button></div>
    </div>`;
  window._models = Object.fromEntries(d.models.map(m => [m.id, m]));
  $("#model-search").addEventListener("input", renderTables);
  renderTables();
}
window.toggleModel = async (id, enable) => {
  try {
    await api("models/toggle", {method: "POST", body: {id, enabled: enable}});
    toast((enable ? "Enabled " : "Disabled ") + id);
    render();
  } catch (e) { toast(e.message, true); }
};
window.doResearch = async id => {
  try {
    const r = await api("models/research", {method: "POST", body: {model_id: id}});
    toast(r.queued ? "Research queued for " + id : (r.note || "Not queued"));
    render();
  } catch (e) { toast(e.message, true); }
};
window.editModel = id => {
  const m = window._models[id] || {};
  const panel = $("#model-editor");
  panel.style.display = "block";
  $("#me-id").textContent = id;
  $("#me-tier").value = m.relative_cost_tier || "";
  $("#me-policy").value = m.content_policy || "";
  $("#me-tags").value = parseTags(m.tags).join(", ");
  $("#me-good").value = m.good_for || "";
  $("#me-style").value = m.reasoning_style || "";
  $("#me-refine").checked = !!m.benefits_from_explicit_prompting;
  const ok = m.tool_calls_ok || 0, fail = m.tool_calls_failed || 0;
  $("#me-reliability").textContent = (ok + fail) >= 3
    ? `${Math.round(100 * ok / (ok + fail))}% ok over ${ok + fail} observed calls (empirical, from live traffic)`
    : `not enough observed calls yet (${ok + fail}/3 minimum)`;
  // Live benchmark rows, with cross-category score-collision flagging (the
  // corruption signature: two categories sharing one exact score).
  const renderBench = rows => {
    if (!rows || !rows.length) { $("#me-benchmarks").textContent = "none"; return; }
    const byScore = {};
    rows.forEach(b => { (byScore[b.score] = byScore[b.score] || []).push(b.category); });
    $("#me-benchmarks").innerHTML = rows.map(b => {
      const sharing = (byScore[b.score] || []).filter(c => c !== b.category);
      const dup = sharing.length > 0;
      let tip = `${b.source_type} · ${b.score_type} · conf ${b.confidence}`;
      if (b.last_updated) tip += " · " + String(b.last_updated).slice(0, 19);
      if (dup) tip += " — COLLISION with " + sharing.join(", ")
                      + "; same score across categories, demoted as synthetic";
      return `<span class="pill${dup ? " bad" : ""}" style="border:1px solid var(--line)" title="${esc(tip)}">${esc(b.category)} ${b.score}${dup ? " ⚠" : ""}</span>`;
    }).join(" ");
  };
  const renderNamed = rows => {
    if (!rows || !rows.length) { $("#me-named").textContent = "none"; return; }
    $("#me-named").innerHTML = rows.map(b => {
      const off = b.scale !== "percent";   // elo/count/score: shown, not tiebroken
      const manual = b.source === "manual";
      const tip = `${b.category} · ${b.scale}${off ? " (not used in tiebreak — non-percent scale)" : ""}${manual ? " · manual (never auto-overwritten)" : ""}${b.source_url ? " · " + b.source_url : ""}`;
      return `<span class="pill${off ? " warn" : ""}" style="border:1px solid var(--line)" title="${esc(tip)}">${esc(b.benchmark_name)} ${b.score}${off ? " " + esc(b.scale) : ""}${manual ? " ✎" : ""} <a href="#" data-nb="${esc(b.benchmark_name)}" title="remove" style="text-decoration:none">✕</a></span>`;
    }).join(" ");
    $("#me-named").querySelectorAll("a[data-nb]").forEach(a => {
      a.onclick = async ev => {
        ev.preventDefault();
        try {
          const r = await api("models/named_benchmark/delete",
                              {method: "POST", body: {model_id: id, benchmark_name: a.dataset.nb}});
          renderNamed(r.named);
        } catch (e) { toast(e.message, true); }
      };
    });
  };
  $("#nb-add").onclick = async () => {
    const name = $("#nb-name").value.trim(), score = $("#nb-score").value.trim();
    if (!name || score === "") { toast("name and score required", true); return; }
    try {
      const r = await api("models/named_benchmark/add", {method: "POST", body: {
        model_id: id, benchmark_name: name, category: $("#nb-cat").value,
        score: score, scale: $("#nb-scale").value, source_url: $("#nb-url").value.trim()}});
      toast("Added " + name);
      $("#nb-name").value = ""; $("#nb-score").value = ""; $("#nb-url").value = "";
      renderNamed(r.named);
    } catch (e) { toast(e.message, true); }
  };
  $("#me-benchmarks").textContent = "…";
  $("#me-named").textContent = "…";
  api("models/benchmarks?model_id=" + encodeURIComponent(id))
    .then(r => { renderBench(r.benchmarks); renderNamed(r.named); })
    .catch(() => { $("#me-benchmarks").textContent = "—"; $("#me-named").textContent = "—"; });
  $("#me-reset-bench").onclick = async () => {
    if (!confirm("Reset " + id + "'s automatic benchmark rows to reference-seed "
                 + "defaults? (manual overrides are kept)")) return;
    try {
      const r = await api("models/reset_benchmarks", {method: "POST", body: {model_id: id}});
      toast("Removed " + r.removed + ", reseeded " + r.reseeded);
      renderBench(r.benchmarks);
    } catch (e) { toast(e.message, true); }
  };
  // The panel lives below a potentially very long table — without this,
  // clicking "edit" appears to do nothing (confirmed deployment bug).
  panel.scrollIntoView({behavior: "smooth", block: "start"});
  $("#me-save").onclick = () => {
    const tags = $("#me-tags").value.split(",").map(s => s.trim()).filter(Boolean);
    run(api("models/update", {method: "POST", body: {
      id, relative_cost_tier: $("#me-tier").value || null,
      content_policy: $("#me-policy").value || null,
      tags: tags.length ? JSON.stringify(tags) : null,
      good_for: $("#me-good").value || null,
      reasoning_style: $("#me-style").value || null,
      benefits_from_explicit_prompting: $("#me-refine").checked ? 1 : 0}}));
  };
};

/* -------------------------------------------------------------- personas -- */
async function tabPersonas() {
  const [d, td, md, sd] = await Promise.all([
    api("personas"), api("tools"), api("models"), api("mcp_servers")]);
  // Servers that execute code — a persona preferring any of them is
  // code-execution-enabled and gets flagged distinctly from read-only personas.
  const codeExecServers = new Set(
    (sd.servers || []).filter(s => s.executes_code).map(s => s.name));
  const personaExecutesCode = p => {
    let pref = [];
    try { pref = JSON.parse(p.preferred_mcp_tools || "[]"); } catch (e) {}
    // entries are bare server strings OR {server, tools} objects — check both
    return pref.some(x => codeExecServers.has(typeof x === "string" ? x : (x && x.server)));
  };
  // Review-model choices: any reachable chat-capable model, local or paid —
  // same selection pattern as elsewhere, never hardcoded to a specific model.
  const reviewChoices = (md.models || [])
    .filter(m => m.reachable && !m.embedding)
    .map(m => m.id).sort();
  const reviewOpts = ['<option value="">— choose a model —</option>']
    .concat(reviewChoices.map(id => `<option>${esc(id)}</option>`)).join("");
  // Same discovered set the Tools tab reads — no second source, no drift.
  // Grouped by SERVER, now with each server's individual tools so a persona can
  // grant a whole server (one click) OR scope to hand-picked tools within it.
  const servers = {};
  for (const t of (td.tools || []).filter(x => x.kind === "mcp")) {
    // Gateway root-admin tools (mcp-add/mcp-remove/…) are never a selectable
    // grant — they reconfigure the whole gateway. Managed on MCP > Gateway
    // Servers instead, and excluded from persona resolution in the backend too.
    if (t.is_admin) continue;
    const s = t.server || t.name;
    (servers[s] ||= {tools: [], disabled: 0}).tools.push(
      {tool: t.mcp_tool || t.name, is_write: !!t.is_write, disabled: !!t.disabled});
    if (t.disabled) servers[s].disabled++;
  }
  // total tool count per server — used by the Personas table's scoped badge.
  window._mcpServerToolCounts = Object.fromEntries(
    Object.entries(servers).map(([s, i]) => [s, i.tools.length]));
  const serverNames = Object.keys(servers).sort();
  const checklist = serverNames.length
    ? serverNames.map(s => {
        const info = servers[s];
        const allDisabled = info.disabled === info.tools.length;
        const toolBoxes = info.tools.map(t => `
          <label class="mcp-tool-item${t.disabled ? " disabled" : ""}" style="display:block;margin-left:22px">
            <input type="checkbox" class="mcp-tool" data-server="${esc(s)}" data-tool="${esc(t.tool)}"
              data-write="${t.is_write ? 1 : 0}">
            <span class="mono">${esc(t.tool)}</span>
            ${t.is_write ? '<span class="pill bad" title="write/execute-capable (naming heuristic) — grant deliberately">write</span>' : ""}
            ${t.disabled ? '<span class="pill warn">disabled on Tools tab</span>' : ""}
          </label>`).join("");
        return `<div class="mcp-item" data-server="${esc(s)}"${allDisabled
            ? ' title="Every tool on this server is disabled on the Tools tab"' : ""}>
          <label>
            <input type="checkbox" class="mcp-srv" value="${esc(s)}"
              data-tools="${esc(info.tools.map(t => t.tool).join(","))}">
            <span class="mono">${esc(s)}</span>
            <span class="hint">mcp · ${info.tools.length} tool${info.tools.length === 1 ? "" : "s"} — select whole server${info.disabled ? ", " + info.disabled + " disabled" : ""}</span>
            ${allDisabled ? '<span class="pill bad">disabled</span>' : ""}
          </label>
          <a href="#" class="mcp-expand" data-server="${esc(s)}" style="margin-left:22px;font-size:12px">customize tools ▸</a>
          <div class="mcp-tools" data-server="${esc(s)}" style="display:none">
            <div class="hint" style="margin-left:22px">Check individual tools to scope this persona to just those; leave the whole-server box for all current & future tools.
              ${info.tools.some(t => t.is_write) ? '<a href="#" class="mcp-readonly" data-server="' + esc(s) + '">select read-only only</a>' : ""}</div>
            ${toolBoxes}
          </div>
        </div>`;
      }).join("")
    : `<span class="hint">No MCP servers discovered yet — add one on the MCP tab.
       Any existing entries on a persona are preserved.</span>`;
  // Client-compat badges (Phase 5): documentation metadata — which clients a
  // persona is tuned for, and how each experiences it (hover for the note).
  const compatCell = p => {
    let compat = {};
    try { compat = JSON.parse(p.client_compat || "{}") || {}; } catch (e) {}
    const pills = Object.entries(compat).map(([c, note]) =>
      `<span class="pill ok" title="${esc(String(note))}">${esc(c)}</span>`).join(" ");
    const style = p.output_style === "plain_text"
      ? ' <span class="pill warn" title="output steered to plain text/markdown — for messaging bridges that cannot render HTML">plain-text</span>' : "";
    return (pills || '<span class="hint">—</span>') + style;
  };
  // MCP-grant badges: a bare server shows plain; a scoped grant shows
  // "server (k/N tools)" so partial access is visible from the table alone.
  const counts = window._mcpServerToolCounts || {};
  const mcpGrantCell = p => {
    let entries = [];
    try { entries = JSON.parse(p.preferred_mcp_tools || "[]"); } catch (e) {}
    if (!Array.isArray(entries) || !entries.length) return '<span class="hint">—</span>';
    return entries.map(e => {
      if (typeof e === "string")
        return `<span class="pill ok" title="whole server — all current & future tools">${esc(e)}</span>`;
      if (e && e.server) {
        const total = counts[e.server];
        const k = (e.tools || []).length;
        return `<span class="pill warn" title="scoped — only ${esc((e.tools || []).join(", "))}">${esc(e.server)} (${k}${total ? "/" + total : ""} tools)</span>`;
      }
      return "";
    }).join(" ");
  };
  const rows = d.personas.map(p => `<tr>
    <td class="nw"><b>${esc(p.virtual_name)}</b> ${p.enabled ? "" : '<span class="pill warn">disabled</span>'}
      ${p.context_window ? '<span class="pill ok" title="admin-set context override">ctx: ' + esc(formatCtx(p.context_window)) + '</span>' : ''}
      ${p.review_enabled ? '<span class="pill ' + (p.review_model ? 'ok' : 'warn') + '" title="tiered review pass: ' + esc(p.review_model || 'NO MODEL SELECTED — review will be skipped') + '">🔎 review</span>' : ''}
      ${personaExecutesCode(p) ? '<span class="pill bad" title="This persona can EXECUTE CODE — it prefers a code-sandbox MCP server. Every execution is audited in tool_call_log.">⚠ code exec</span>' : ''}</td>
    <td class="nw">${esc(p.benchmark_category)}</td><td class="nw">${esc(p.local_bias_strength)}</td>
    <td>${mcpGrantCell(p)}</td>
    <td>${compatCell(p)}</td>
    <td>${esc(p.description || "")}</td>
    <td class="nw"><button class="act" onclick='editPersona(${JSON.stringify(p.virtual_name)})'>edit</button>
        <button class="act" onclick='clonePersona(${JSON.stringify(p.virtual_name)})'>clone</button>
        <button class="act" onclick='run(api("personas/delete",{method:"POST",body:{virtual_name:${JSON.stringify(p.virtual_name)}}}))'>delete</button></td>
    </tr>`).join("");
  $("#main").innerHTML = `
    <h2>Personas — virtual models advertised via /api/tags</h2>
    <p class="hint">Each row is a routing policy. Adding a workload type (e.g. Foundry-Creative)
    is adding a row here — never a code change (§4.8).</p>
    <table><tr><th>name</th><th>category</th><th>local bias</th><th>MCP tools</th><th title="Which clients this persona is tuned for — hover a badge for the note. Documentation metadata: one persona serves multiple clients; only fork a client-specific persona when an existing one genuinely doesn't serve that client well.">clients</th><th>description</th><th></th></tr>${rows}</table>
    <div class="card">
      <h2 style="margin-top:0" id="pe-title">Add / edit persona</h2>
      <div class="row"><label>virtual_name</label><input id="pe-name" size="28"></div>
      <div class="row"><label>description</label><input id="pe-desc" size="70"></div>
      <div class="row">
        <label title="Token count reported to clients (AnythingLLM, Open WebUI) via /api/show. Pins the context length regardless of backend discovery state. Set this to your largest worker model's actual context window. 0 = auto-discover from backends.">context_window (tokens)</label>
        <input id="pe-ctx" type="number" min="0" step="1024" size="14" value="0" placeholder="e.g. 131072">
        <span class="hint">(0 = auto-discover from backends)</span>
      </div>
      <div class="row"><label>benchmark_category</label>
        <select id="pe-cat"><option>coding</option><option>reasoning</option>
        <option>general_chat</option><option>tool_calling</option><option>agentic</option></select>
        <label>local_bias_strength</label>
        <select id="pe-bias"><option>strong</option><option>moderate</option>
        <option>cost_aware_default</option></select>
        <label>enabled</label><input type="checkbox" id="pe-enabled" checked></div>
      <div class="row"><label>escalation_triggers (JSON list)</label>
        <input id="pe-trig" size="70" value="[]"></div>
      <div class="row"><label title="MCP servers preferentially loaded for this persona's sessions (writes to preferred_mcp_tools). Checking a server prefers ALL of its tools. Populated live from the Tools tab's discovered set. Model (ask_*) tools are always available and not listed here. Not auto-attached — checking is a deliberate per-persona context-cost choice.">preferred MCP servers</label>
        <div id="pe-mcp" class="mcp-checklist">${checklist}</div></div>
      <div class="row"><label>guardrail_overrides (JSON obj)</label>
        <input id="pe-guard" size="70" value="{}"></div>
      <div class="row"><label title="Ordered list of model ids boosted to the top of this persona's candidates. Not hard-required: guardrail/quota denial falls through to the next pin, then the normal pool.">pinned_models (JSON list, priority order)</label>
        <input id="pe-pins" size="70" value="[]" placeholder='["claude-sonnet-4-6", "glm-4.7-flash:latest"]'></div>
      <div class="row">
        <label title="agent = generic brain loop; pipeline = Prepare (cheapest Claude) → Execute (best measured local coder) → Check (paid review)">execution_mode</label>
        <select id="pe-mode"><option value="">agent</option><option>pipeline</option></select>
        <label title="pipeline mode only: paid review of the local output (one bounded retry)">pipeline_check</label>
        <input type="checkbox" id="pe-check" checked>
        <label title="After a LOCAL answer, this judge decides adequate/escalate. paid = cheapest Claude; local_large = best other local model (free); brain = routing brain itself">outcome_judge</label>
        <select id="pe-judge"><option value="">off</option><option>paid</option>
          <option>local_large</option><option>brain</option></select>

/* Read the MCP checklist back into a preferred_mcp_tools list (per-tool-grant
   spec — mixed shapes). Per listed server: all tools checked => bare server
   string (whole server, incl. future tools); some checked => {server, tools:[…]}
   scoped grant; none => omitted. Prior entries for servers NOT currently shown
   (offline) are preserved verbatim so editing never drops config the UI can't
   display. */
function readPreferredMcp(prevList) {
  const items = [...document.querySelectorAll("#pe-mcp .mcp-item")];
  const listedServers = new Set(items.map(i => i.dataset.server));
  const listedTools = new Set();
  const out = [];
  for (const item of items) {
    const s = item.dataset.server;
    const boxes = [...item.querySelectorAll(".mcp-tool")];
    boxes.forEach(b => listedTools.add(b.dataset.tool));
    const checked = boxes.filter(b => b.checked).map(b => b.dataset.tool);
    if (!checked.length) continue;
    if (checked.length === boxes.length) out.push(s);              // whole server
    else out.push({server: s, tools: checked});                   // scoped
  }
  // Preserve entries whose server isn't shown right now (offline server, etc.).
  for (const e of (prevList || [])) {
    if (typeof e === "string") {
      if (!listedServers.has(e) && !listedTools.has(e)) out.push(e);
    } else if (e && e.server && !listedServers.has(e.server)) {
      out.push(e);
    }
  }
  return out;
}

/* Parse a stored preferred_mcp_tools value into grant sets (mirror of the
   backend parse_preferred_mcp): {whole, bare, scoped{server->Set}}. */
function parsePreferredMcp(raw) {
  let entries = [];
  try { entries = JSON.parse(raw || "[]"); } catch (e) {}
  if (!Array.isArray(entries)) entries = [];
  const whole = new Set(), bare = new Set(), scoped = {};
  for (const e of entries) {
    if (typeof e === "string") bare.add(e);
    else if (e && e.server) {
      if (e.tools == null) whole.add(e.server);
      else (scoped[e.server] ||= new Set(), (e.tools || []).forEach(t => scoped[e.server].add(t)));
    }
  }
  return {whole, bare, scoped};
}

/* Recompute a server-level checkbox from its individual tool boxes: all =>
   checked, none => unchecked, some => indeterminate (the "mixed"/scoped look). */
function refreshServerBox(item) {
  const srv = item.querySelector(".mcp-srv");
  const boxes = [...item.querySelectorAll(".mcp-tool")];
  const n = boxes.filter(b => b.checked).length;
  srv.indeterminate = n > 0 && n < boxes.length;
  srv.checked = boxes.length > 0 && n === boxes.length;
}

/* Wire the checklist interactions once the form is rendered. */
function wireMcpChecklist() {
  document.querySelectorAll("#pe-mcp .mcp-item").forEach(item => {
    const srv = item.querySelector(".mcp-srv");
    const toolBoxes = [...item.querySelectorAll(".mcp-tool")];
    // whole-server box drives all tool boxes (and collapses to the summary).
    srv.addEventListener("change", () => {
      toolBoxes.forEach(b => { b.checked = srv.checked; });
      srv.indeterminate = false;
    });
    // any tool box flips the server box to checked / mixed / unchecked.
    toolBoxes.forEach(b => b.addEventListener("change", () => refreshServerBox(item)));
    const expand = item.querySelector(".mcp-expand");
    const tools = item.querySelector(".mcp-tools");
    if (expand) expand.onclick = ev => {
      ev.preventDefault();
      const open = tools.style.display === "none";
      tools.style.display = open ? "" : "none";
      expand.textContent = open ? "customize tools ▾" : "customize tools ▸";
    };
    const ro = item.querySelector(".mcp-readonly");
    if (ro) ro.onclick = ev => {
      ev.preventDefault();
      toolBoxes.forEach(b => { b.checked = b.dataset.write !== "1"; });
      refreshServerBox(item);
      tools.style.display = "";
      if (expand) expand.textContent = "customize tools ▾";
    };
  });
}
// Apply a sensible default context_window to personas that have none yet — an
// explicit convenience wired to the "Apply default context windows" button,
// never automatic (viewing a tab must not mutate config). Only fills NULL/0
// values; never overwrites an admin-set override. The numbers are starting
// points — review them against your workers' real windows, since advertising
// more than a worker can hold just forces a degrade at dispatch time.
window.applyDefaultContextWindows = async () => {
  const defaults = {
    "Foundry-Agent":     32768,
    "Foundry-Chat":      131072,
    "Foundry-Coding":    131072,
    "Foundry-Creative":   65536,
    "Foundry-RAG":       131072,
    "Foundry-Research":  131072,
    "Foundry-Vision":     65536,
  };
  const updated = [];
  for (const [name, ctx] of Object.entries(defaults)) {
    const p = window._personas[name];
    if (!p) continue;
    if (p.context_window == null || p.context_window === 0) {
      try {
        await api("personas", {method: "POST", body: {
          virtual_name: name, context_window: ctx}});
        updated.push(name + ": " + formatCtx(ctx));
      } catch (e) { toast(e.message, true); return; }
    }
  }
  toast(updated.length
    ? "Set default context windows for " + updated.join(", ")
    : "All personas already have a context_window set");
  if (updated.length) render();   // refresh so the new ctx pills appear
};

window.editPersona = name => {
  const p = window._personas[name]; if (!p) return;
  $("#pe-title").textContent = "Edit " + name;
  document.querySelector("#pe-name").closest(".card")
    .scrollIntoView({behavior: "smooth", block: "start"});
  $("#pe-name").value = p.virtual_name;
  $("#pe-desc").value = p.description || "";
  // context_window is nullable — show 0 if unset so the field never reads blank.
  $("#pe-ctx").value = p.context_window != null ? p.context_window : 0;
  $("#pe-cat").value = p.benchmark_category || "general_chat";
  $("#pe-bias").value = p.local_bias_strength || "moderate";
  $("#pe-enabled").checked = !!p.enabled;
  $("#pe-trig").value = p.escalation_triggers || "[]";
  // Restore grants (per-tool-grant spec): a whole-server grant checks every
  // tool box; a scoped grant checks only the listed tools and leaves the
  // server box in the mixed/indeterminate state (auto-expanded so it's visible).
  const {whole, bare, scoped} = parsePreferredMcp(p.preferred_mcp_tools);
  document.querySelectorAll("#pe-mcp .mcp-item").forEach(item => {
    const s = item.dataset.server;
    const allGranted = whole.has(s) || bare.has(s);
    const scopedSet = scoped[s] || new Set();
    let anyScoped = false;
    item.querySelectorAll(".mcp-tool").forEach(b => {
      const t = b.dataset.tool;
      b.checked = allGranted || scopedSet.has(t) || bare.has(t);
      if (!allGranted && b.checked) anyScoped = true;
    });
    refreshServerBox(item);
    if (anyScoped) {   // expand so the admin sees exactly what's scoped
      const tools = item.querySelector(".mcp-tools");
      const expand = item.querySelector(".mcp-expand");
      if (tools) tools.style.display = "";
      if (expand) expand.textContent = "customize tools ▾";
    }
  });
  $("#pe-guard").value = p.guardrail_overrides || "{}";
  $("#pe-pins").value = p.pinned_models || "[]";
  $("#pe-mode").value = p.execution_mode || "";
  $("#pe-braintools").checked = !!p.brain_handles_tools;
  $("#pe-check").checked = p.pipeline_check_enabled === null
    || p.pipeline_check_enabled === undefined || !!p.pipeline_check_enabled;
  $("#pe-judge").value = p.outcome_judge || "";
  $("#pe-reqtags").value = p.required_tags || "[]";
  $("#pe-perm").checked = !!p.prefer_permissive;
  $("#pe-loaded").checked = !!p.prefer_loaded;
  $("#pe-weights").value = p.selection_weights || "{}";
  $("#pe-review").checked = !!p.review_enabled;
  // A configured review model may be temporarily unreachable (not in the
  // select's options) — inject it so editing doesn't silently drop it.
  const rm = $("#pe-review-model");
  if (p.review_model && ![...rm.options].some(o => o.value === p.review_model))
    rm.add(new Option(p.review_model + " (unreachable)", p.review_model));
  rm.value = p.review_model || "";
  $("#pe-prefilter").checked = p.review_prefilter === null
    || p.review_prefilter === undefined || !!p.review_prefilter;
  $("#pe-compat").value = p.client_compat || "{}";
  $("#pe-style").value = p.output_style || "";
};
