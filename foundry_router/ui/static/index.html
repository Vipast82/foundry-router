<!doctype html>
<!--
  Foundry Router admin panel.
  Stack choice: one static HTML file, vanilla JS, zero build toolchain — the
  best maintainability-per-dependency for a small internal admin surface.
  Served by the same FastAPI app at /ui; talks to /admin/api/*.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foundry Router</title>
<style>
  :root { --bg:#14161a; --panel:#1d2026; --line:#2c3038; --fg:#d7dae0; --dim:#8b919c;
          --accent:#e8a33d; --ok:#5fb26a; --bad:#d05f5f; --warn:#d0a75f; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.45 system-ui, "Segoe UI", sans-serif; }
  header { display:flex; align-items:center; gap:16px; padding:10px 18px;
           background:var(--panel); border-bottom:1px solid var(--line); }
  header h1 { font-size:16px; margin:0; color:var(--accent); font-weight:600; }
  header .sub { color:var(--dim); font-size:12px; }
  nav { display:flex; gap:2px; padding:0 12px; background:var(--panel);
        border-bottom:1px solid var(--line); flex-wrap:wrap; }
  nav button { background:none; border:none; color:var(--dim); padding:9px 13px;
               cursor:pointer; font-size:13px; border-bottom:2px solid transparent; }
  nav button.active { color:var(--fg); border-bottom-color:var(--accent); }
  main { padding:16px 18px; max-width:1200px; overflow-x:auto; }
  h2 { font-size:14px; margin:18px 0 8px; color:var(--accent); }
  .hint { color:var(--dim); font-size:12px; margin:4px 0 10px; }
  table { border-collapse:collapse; width:100%; margin:6px 0 14px; font-size:13px; }
  th,td { text-align:left; padding:6px 9px; border-bottom:1px solid var(--line);
          vertical-align:top; }
  /* Long model ids/URLs may break anywhere, but headers must never split
     mid-word ("person/a", "ste/ps") — headers stay on one line and the
     table scrolls horizontally inside <main> if it gets too wide. */
  td { word-break:break-word; }
  th { color:var(--dim); font-weight:500; white-space:nowrap; }
  .nw { white-space:nowrap; word-break:normal; }
  .pill { display:inline-block; padding:1px 8px; border-radius:9px; font-size:11px;
          white-space:nowrap; }
  .ok  { background:#1d3a23; color:var(--ok); }
  .bad { background:#3a1d1d; color:var(--bad); }
  .warn{ background:#3a331d; color:var(--warn); }
  button.act { background:var(--panel); color:var(--fg); border:1px solid var(--line);
               border-radius:5px; padding:5px 11px; cursor:pointer; font-size:12px;
               white-space:nowrap; }
  button.act:hover { border-color:var(--accent); }
  button.act:disabled { opacity:.35; cursor:not-allowed; }
  button.act:disabled:hover { border-color:var(--line); }
  button.primary { border-color:var(--accent); color:var(--accent); }
  input, select, textarea { background:var(--bg); color:var(--fg);
    border:1px solid var(--line); border-radius:5px; padding:5px 8px; font-size:13px; }
  textarea { width:100%; font-family:ui-monospace, monospace; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin:6px 0; }
  .row label { color:var(--dim); font-size:12px; min-width:170px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px;
          padding:12px 14px; margin:10px 0; }
  code, .mono { font-family:ui-monospace, Consolas, monospace; font-size:12px; }
  #toast { position:fixed; bottom:16px; right:16px; background:var(--panel);
           border:1px solid var(--accent); padding:9px 14px; border-radius:6px;
           display:none; z-index:9; }
  details summary { cursor:pointer; color:var(--dim); }
  /* Persona MCP-tool selector: a live checklist replacing the old raw-JSON
     input, populated from the same discovered set the Tools tab shows. */
  .mcp-checklist { display:flex; flex-direction:column; gap:1px; flex:1;
    min-width:280px; max-height:180px; overflow-y:auto; padding:6px 8px;
    border:1px solid var(--line); border-radius:5px; background:var(--bg); }
  .mcp-item { display:flex; align-items:center; gap:7px; color:var(--fg);
    padding:2px 0; min-width:0; }
  .mcp-item.disabled { opacity:.5; }
  .mcp-item input { flex:none; }
  .mcp-item .hint { white-space:nowrap; }
</style>
</head>
<body>
<header>
  <h1>Foundry Router</h1>
  <span class="sub" id="hdr-info">loading…</span>
</header>
<nav id="nav"></nav>
<main id="main"></main>
<div id="toast"></div>

<script>
"use strict";
const $ = (s, el=document) => el.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function api(path, opts={}) {
  const r = await fetch("/admin/api/" + path, {
    headers: {"Content-Type": "application/json"}, ...opts,
    body: opts.body !== undefined ? JSON.stringify(opts.body) : undefined,
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}
function toast(msg, isErr=false) {
  const t = $("#toast");
  t.textContent = msg; t.style.borderColor = isErr ? "var(--bad)" : "var(--accent)";
  t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 3500);
}
const run = p => p.then(d => { toast("Saved"); render(); return d; })
                  .catch(e => toast(e.message, true));

/* ------------------------------------------------------------------ tabs -- */
const TABS = {
  "Backends":  tabBackends,  "Models":   tabModels,   "Personas": tabPersonas,
  "Tools":     tabTools,     "Guardrails": tabGuardrails, "MCP":  tabMCP,
  "Usage Log": tabUsage,     "Events":   tabEvents,
};
let current = "Backends";
function render() {
  const nav = $("#nav"); nav.innerHTML = "";
  for (const name of Object.keys(TABS)) {
    const b = document.createElement("button");
    b.textContent = name; b.className = name === current ? "active" : "";
    b.onclick = () => { current = name; render(); };
    nav.appendChild(b);
  }
  $("#main").innerHTML = "<p class='hint'>loading…</p>";
  TABS[current]().catch(e => $("#main").innerHTML =
    `<p class="hint">failed to load: ${esc(e.message)}</p>`);
}

/* -------------------------------------------------------------- backends -- */
async function tabBackends() {
  const st = await api("status");
  $("#hdr-info").textContent =
    `v${st.version} · pool: ${st.pool_mode} · brain: ${st.brain.model} (${st.brain.provider}) · ${st.tool_count} tools`;
  const rows = st.backends.map(b => `<tr>
      <td class="nw">${esc(b.name)}</td><td class="mono nw">${esc(b.type)}</td>
      <td class="mono">${esc(b.url)}</td><td>${b.priority}</td>
      <td><span class="pill ${b.healthy ? "ok" : "bad"}">${b.healthy ? "healthy" : "down"}</span></td>
      <td class="mono">${(b.models || []).slice(0, 8).map(esc).join(", ")}${(b.models||[]).length > 8 ? "…" : ""}</td>
      <td class="mono">${esc(b.last_error || "")}</td></tr>`).join("");
  $("#main").innerHTML = `
    <h2>Backend Pool — mode: ${esc(st.pool_mode)}</h2>
    <table><tr><th>name</th><th>type</th><th>url</th><th>prio</th><th>health</th><th>models</th><th>last error</th></tr>${rows}</table>
    <div class="row"><button class="act" id="test-meridian"
      title="Free read-only probe of Meridian's quota endpoint — answers 'is the Claude subscription login still valid' without burning a real generation">Test Meridian Auth</button>
      <span id="meridian-health" class="hint"></span></div>
    <div class="card">
      <h2 style="margin-top:0">Edit backend list (internal mode)</h2>
      <p class="hint">JSON list. Use <code>\${MERIDIAN_API_KEY}</code>-style references for api_key —
      the value is written into config.yaml verbatim. Saving rebuilds the pool live.</p>
      <textarea id="backends-json" rows="12"></textarea>
      <div class="row"><button class="act primary" id="save-backends">Save backends</button>
      <select id="pool-mode">
        ${["internal","olla","litellm"].map(m =>
          `<option ${m === st.pool_mode ? "selected" : ""}>${m}</option>`).join("")}
      </select>
      <button class="act" id="save-mode">Switch pool mode</button></div>
    </div>
    <div class="card">
      <h2 style="margin-top:0">Agent Brain</h2>
      <p class="hint">The model that makes routing decisions on every request (design doc §4.2).</p>
      <div class="row"><label>provider</label>
        <select id="brain-provider">${["ollama","meridian","openrouter"].map(p =>
          `<option ${p === st.brain.provider ? "selected" : ""}>${p}</option>`).join("")}</select>
        <label>endpoint</label><input id="brain-endpoint" size="34" value="${esc(st.brain.endpoint)}">
        <label>model</label><input id="brain-model" size="24" value="${esc(st.brain.model)}"></div>
      <p class="hint">Context budget — size these to the brain's real headroom (a 6GB local
      brain with num_ctx ~6144 has ~1500 tokens free after system prompt + tool schemas;
      a Claude-class brain can take far more). Tool-result limits only cap the preview the
      brain sees — the full output still reaches the user via use_last_result. Applies live.</p>
      <div class="row">
        <label>tool_result_limit_chars</label><input id="brain-trl" type="number" size="8">
        <label>mcp_result_limit_chars</label><input id="brain-mrl" type="number" size="8">
        <label>worker_max_tokens</label><input id="brain-wmt" type="number" size="8">
        <label title="Caps what the brain sees of a large pasted user message before routing — the worker still receives the complete original (include_full_user_message)">user_input_preview_chars</label>
        <input id="brain-uip" type="number" size="8">
        <label title="While a worker/brain/MCP call is in flight, emit a 'still working' narration line every N seconds so reverse proxies and clients never mistake a slow request (failover + cold model load) for a dead one. 0 disables.">heartbeat_seconds</label>
        <input id="brain-hb" type="number" size="6">
        <button class="act primary" id="save-brain">Save brain</button></div>
    </div>`;
  const cfg = await api("config");
  $("#backends-json").value =
    JSON.stringify(cfg.backend_pool.internal.backends, null, 2);
  $("#brain-trl").value = cfg.agent_brain.tool_result_limit_chars;
  $("#brain-mrl").value = cfg.agent_brain.mcp_result_limit_chars;
  $("#brain-wmt").value = cfg.agent_brain.worker_max_tokens;
  $("#brain-uip").value = cfg.agent_brain.user_input_preview_chars;
  $("#brain-hb").value = cfg.agent_brain.heartbeat_seconds;
  $("#test-meridian").onclick = async () => {
    const el = $("#meridian-health");
    el.textContent = "checking…";
    try {
      const r = await api("meridian/health");
      if (!r.backends.length) {
        el.textContent = "no anthropic-compatible backend configured";
        return;
      }
      el.innerHTML = r.backends.map(b =>
        `${esc(b.backend)}: ` + (b.valid
          ? '<span class="pill ok">auth valid</span>'
          : '<span class="pill bad">auth stale/invalid</span>')
        + ` <span class="hint">${esc(b.error || b.note || "")}${b.oauth_ok === false
          ? " — oauth source NULL; on the host run: meridian profile login &lt;profile&gt; --headless"
          : ""}</span>`).join("<br>");
    } catch (e) { el.textContent = e.message; }
  };
  $("#save-backends").onclick = () =>
    run(api("config/backends", {method: "POST", body: JSON.parse($("#backends-json").value)}));
  $("#save-mode").onclick = () =>
    run(api("config/pool_mode", {method: "POST", body: {mode: $("#pool-mode").value}}));
  $("#save-brain").onclick = () =>
    run(api("config/brain", {method: "POST", body: {
      provider: $("#brain-provider").value, endpoint: $("#brain-endpoint").value,
      model: $("#brain-model").value,
      tool_result_limit_chars: +$("#brain-trl").value,
      mcp_result_limit_chars: +$("#brain-mrl").value,
      worker_max_tokens: +$("#brain-wmt").value,
      user_input_preview_chars: +$("#brain-uip").value,
      heartbeat_seconds: +$("#brain-hb").value}}));
}

/* ---------------------------------------------------------------- models -- */
const parseTags = s => { try { const t = JSON.parse(s || "[]"); return Array.isArray(t) ? t : []; } catch (e) { return []; } };
const RESEARCH_PILL = {queued: "warn", running: "warn", ok: "ok", failed: "bad"};

async function tabModels() {
  const d = await api("models");
  const isEnabled = m => m.enabled === null || m.enabled === undefined || !!m.enabled;
  const rBtn = m => d.research_ready
    ? `<button class="act" onclick='doResearch(${JSON.stringify(m.id)})'>research</button>`
    : `<button class="act" disabled title="${esc(d.research_reason)}">research</button>`;
  const rowHtml = m => `<tr${isEnabled(m) ? "" : ' style="opacity:.45"'}>
    <td class="mono">${esc(m.id)} ${m.reachable ? '<span class="pill ok">live</span>' : ""}</td>
    <td class="nw">${esc(m.relative_cost_tier ?? "")}</td>
    <td>${esc(parseTags(m.tags).join(", "))}${m.content_policy === "permissive" ? ' <span class="pill warn">permissive</span>' : ""}</td>
    <td>${esc(m.good_for ?? "")}</td>
    <td class="nw">${m.research_status
      ? `<span class="pill ${RESEARCH_PILL[m.research_status] || "warn"}" title="${esc(m.research_note || "")}">${esc(m.research_status)}</span>` : ""}</td>
    <td class="mono nw">${esc(m.source ?? "")}</td>
    <td class="nw"><button class="act" onclick='toggleModel(${JSON.stringify(m.id)}, ${isEnabled(m) ? "false" : "true"})'>
        ${isEnabled(m) ? "disable" : "enable"}</button>
        <button class="act" onclick='editModel(${JSON.stringify(m.id)})'>edit</button>
        ${rBtn(m)}</td>
    </tr>`;
  const header = "<tr><th>model</th><th>tier</th><th>tags</th><th>good for</th><th>research</th><th>source</th><th></th></tr>";
  const renderTables = () => {
    const q = ($("#model-search")?.value || "").toLowerCase();
    const match = m => !q ||
      (m.id + " " + (m.tags || "") + " " + (m.good_for || "") + " " +
       (m.relative_cost_tier || "")).toLowerCase().includes(q);
    const live = d.models.filter(m => m.reachable && match(m));
    const known = d.models.filter(m => !m.reachable && match(m));
    $("#live-count").textContent = live.length;
    $("#known-count").textContent = known.length;
    $("#live-table").innerHTML = header + live.map(rowHtml).join("");
    $("#known-table").innerHTML = header + known.map(rowHtml).join("");
  };
  $("#main").innerHTML = `
    <h2>Model Registry</h2>
    <p class="hint">Edits made here are pinned as manual_override — automatic refreshes
    supplement but never replace them (§4.4). Local models are tagged tier
    <b>free</b> automatically at discovery; tags/policy are name-seeded,
    reference-seeded, and research-refined. Disabling a model excludes it from
    the brain's candidates and tools entirely (governance, not capability).${d.research_ready ? "" :
      ` <b>Research is unavailable:</b> ${esc(d.research_reason)}.`}</p>
    <div class="row">
      <input id="model-search" size="34" placeholder="filter by id, tag, tier, good_for…">
      <button class="act primary" onclick="run(api('models/refresh',{method:'POST'}))">Poll OpenRouter now</button>
      <button class="act" title="Fill tags/good_for/estimated scores for known model families (never overwrites manual edits or real research)"
        onclick="api('models/seed',{method:'POST'}).then(r=>{toast('Reference seed applied to '+r.applied+' models');render()}).catch(e=>toast(e.message,true))">Apply reference seed</button>
    </div>
    <h2>Live / Available (<span id="live-count"></span>) — reachable through a configured backend right now</h2>
    <table id="live-table"></table>
    <h2>Known catalog (<span id="known-count"></span>) — discovered but not currently reachable; reference material</h2>
    <table id="known-table"></table>
    <div class="card" id="model-editor" style="display:none">
      <h2 style="margin-top:0">Edit <span id="me-id" class="mono"></span></h2>
      <div class="row"><label>relative_cost_tier</label>
        <select id="me-tier"><option value="">-</option><option>free</option>
        <option>low</option><option>medium</option><option>high</option><option>very_high</option></select>
        <label>content_policy</label>
        <select id="me-policy"><option value="">-</option>
        <option>standard</option><option>permissive</option></select></div>
      <div class="row"><label>tags (comma-separated)</label><input id="me-tags" size="60"
        placeholder="coding, vision, tool-calling, reasoning, creative-writing, long-context"></div>
      <div class="row"><label>good_for</label><input id="me-good" size="60"></div>
      <div class="row"><label>reasoning_style</label><input id="me-style" size="60"></div>
      <div class="row"><label>benefits_from_explicit_prompting</label>
        <input type="checkbox" id="me-refine"></div>
      <div class="row"><label>tool-calling reliability</label>
        <span id="me-reliability" class="hint"></span></div>
      <button class="act primary" id="me-save">Save (manual override)</button>
    </div>`;
  window._models = Object.fromEntries(d.models.map(m => [m.id, m]));
  $("#model-search").addEventListener("input", renderTables);
  renderTables();
}
window.toggleModel = async (id, enable) => {
  try {
    await api("models/toggle", {method: "POST", body: {id, enabled: enable}});
    toast((enable ? "Enabled " : "Disabled ") + id);
    render();
  } catch (e) { toast(e.message, true); }
};
window.doResearch = async id => {
  try {
    const r = await api("models/research", {method: "POST", body: {model_id: id}});
    toast(r.queued ? "Research queued for " + id : (r.note || "Not queued"));
    render();
  } catch (e) { toast(e.message, true); }
};
window.editModel = id => {
  const m = window._models[id] || {};
  const panel = $("#model-editor");
  panel.style.display = "block";
  $("#me-id").textContent = id;
  $("#me-tier").value = m.relative_cost_tier || "";
  $("#me-policy").value = m.content_policy || "";
  $("#me-tags").value = parseTags(m.tags).join(", ");
  $("#me-good").value = m.good_for || "";
  $("#me-style").value = m.reasoning_style || "";
  $("#me-refine").checked = !!m.benefits_from_explicit_prompting;
  const ok = m.tool_calls_ok || 0, fail = m.tool_calls_failed || 0;
  $("#me-reliability").textContent = (ok + fail) >= 3
    ? `${Math.round(100 * ok / (ok + fail))}% ok over ${ok + fail} observed calls (empirical, from live traffic)`
    : `not enough observed calls yet (${ok + fail}/3 minimum)`;
  // The panel lives below a potentially very long table — without this,
  // clicking "edit" appears to do nothing (confirmed deployment bug).
  panel.scrollIntoView({behavior: "smooth", block: "start"});
  $("#me-save").onclick = () => {
    const tags = $("#me-tags").value.split(",").map(s => s.trim()).filter(Boolean);
    run(api("models/update", {method: "POST", body: {
      id, relative_cost_tier: $("#me-tier").value || null,
      content_policy: $("#me-policy").value || null,
      tags: tags.length ? JSON.stringify(tags) : null,
      good_for: $("#me-good").value || null,
      reasoning_style: $("#me-style").value || null,
      benefits_from_explicit_prompting: $("#me-refine").checked ? 1 : 0}}));
  };
};

/* -------------------------------------------------------------- personas -- */
async function tabPersonas() {
  const [d, td] = await Promise.all([api("personas"), api("tools")]);
  // Same discovered set the Tools tab reads — no second source, no drift.
  const mcpTools = (td.tools || []).filter(t => t.kind === "mcp");
  const checklist = mcpTools.length
    ? mcpTools.map(t => `<label class="mcp-item${t.disabled ? " disabled" : ""}"
        title="${t.disabled ? "This tool is disabled on the Tools tab — a persona should not prefer it while disabled" : ""}">
        <input type="checkbox" value="${esc(t.name)}" data-server="${esc(t.server || "")}">
        <span class="mono">${esc(t.name)}</span>
        <span class="hint">mcp · ${esc(t.server || "")}${t.mcp_tool ? "/" + esc(t.mcp_tool) : ""}</span>
        ${t.disabled ? '<span class="pill bad">disabled</span>' : ""}
      </label>`).join("")
    : `<span class="hint">No MCP tools discovered yet — add a server on the MCP tab.
       Any existing entries on a persona are preserved.</span>`;
  const rows = d.personas.map(p => `<tr>
    <td class="nw"><b>${esc(p.virtual_name)}</b> ${p.enabled ? "" : '<span class="pill warn">disabled</span>'}</td>
    <td class="nw">${esc(p.benchmark_category)}</td><td class="nw">${esc(p.local_bias_strength)}</td>
    <td class="mono">${esc(p.preferred_mcp_tools || "[]")}</td>
    <td>${esc(p.description || "")}</td>
    <td class="nw"><button class="act" onclick='editPersona(${JSON.stringify(p.virtual_name)})'>edit</button>
        <button class="act" onclick='clonePersona(${JSON.stringify(p.virtual_name)})'>clone</button>
        <button class="act" onclick='run(api("personas/delete",{method:"POST",body:{virtual_name:${JSON.stringify(p.virtual_name)}}}))'>delete</button></td>
    </tr>`).join("");
  $("#main").innerHTML = `
    <h2>Personas — virtual models advertised via /api/tags</h2>
    <p class="hint">Each row is a routing policy. Adding a workload type (e.g. Foundry-Creative)
    is adding a row here — never a code change (§4.8).</p>
    <table><tr><th>name</th><th>category</th><th>local bias</th><th>MCP tools</th><th>description</th><th></th></tr>${rows}</table>
    <div class="card">
      <h2 style="margin-top:0" id="pe-title">Add / edit persona</h2>
      <div class="row"><label>virtual_name</label><input id="pe-name" size="28"></div>
      <div class="row"><label>description</label><input id="pe-desc" size="70"></div>
      <div class="row"><label>benchmark_category</label>
        <select id="pe-cat"><option>coding</option><option>reasoning</option>
        <option>general_chat</option><option>tool_calling</option><option>agentic</option></select>
        <label>local_bias_strength</label>
        <select id="pe-bias"><option>strong</option><option>moderate</option>
        <option>cost_aware_default</option></select>
        <label>enabled</label><input type="checkbox" id="pe-enabled" checked></div>
      <div class="row"><label>escalation_triggers (JSON list)</label>
        <input id="pe-trig" size="70" value="[]"></div>
      <div class="row"><label title="MCP tools preferentially loaded for this persona's sessions (writes to preferred_mcp_tools). Populated live from the Tools tab's discovered set. Model (ask_*) tools are always available and not listed here. Not auto-attached — checking is a deliberate per-persona context-cost choice.">preferred MCP tools</label>
        <div id="pe-mcp" class="mcp-checklist">${checklist}</div></div>
      <div class="row"><label>guardrail_overrides (JSON obj)</label>
        <input id="pe-guard" size="70" value="{}"></div>
      <div class="row"><label title="Ordered list of model ids boosted to the top of this persona's candidates. Not hard-required: guardrail/quota denial falls through to the next pin, then the normal pool.">pinned_models (JSON list, priority order)</label>
        <input id="pe-pins" size="70" value="[]" placeholder='["claude-sonnet-4-6", "glm-4.7-flash:latest"]'></div>
      <div class="row">
        <label title="agent = generic brain loop; pipeline = Prepare (cheapest Claude) → Execute (best measured local coder) → Check (paid review)">execution_mode</label>
        <select id="pe-mode"><option value="">agent</option><option>pipeline</option></select>
        <label title="pipeline mode only: paid review of the local output (one bounded retry)">pipeline_check</label>
        <input type="checkbox" id="pe-check" checked>
        <label title="After a LOCAL answer, this judge decides adequate/escalate. paid = cheapest Claude; local_large = best other local model (free); brain = routing brain itself">outcome_judge</label>
        <select id="pe-judge"><option value="">off</option><option>paid</option>
          <option>local_large</option><option>brain</option></select></div>
      <div class="row"><label title="When any candidate carries one of these tags, candidates are FILTERED to matches (e.g. vision)">required_tags (JSON list)</label>
        <input id="pe-reqtags" size="40" value="[]" placeholder='["vision"]'>
        <label title="Boost PERMISSIVE-tagged (uncensored) local models to the front">prefer_permissive</label>
        <input type="checkbox" id="pe-perm"></div>
      <button class="act primary" id="pe-save">Save persona</button>
    </div>`;
  window._personas = Object.fromEntries(d.personas.map(p => [p.virtual_name, p]));
  $("#pe-save").onclick = () => run(api("personas", {method: "POST", body: {
    virtual_name: $("#pe-name").value.trim(),
    description: $("#pe-desc").value,
    benchmark_category: $("#pe-cat").value,
    local_bias_strength: $("#pe-bias").value,
    enabled: $("#pe-enabled").checked ? 1 : 0,
    escalation_triggers: JSON.parse($("#pe-trig").value || "[]"),
    preferred_mcp_tools: readPreferredMcp(
      parseTags((window._personas[$("#pe-name").value.trim()] || {}).preferred_mcp_tools)),
    guardrail_overrides: JSON.parse($("#pe-guard").value || "{}"),
    pinned_models: JSON.parse($("#pe-pins").value || "[]"),
    execution_mode: $("#pe-mode").value || null,
    pipeline_check_enabled: $("#pe-check").checked ? 1 : 0,
    outcome_judge: $("#pe-judge").value || null,
    required_tags: JSON.parse($("#pe-reqtags").value || "[]"),
    prefer_permissive: $("#pe-perm").checked ? 1 : 0}}));
window.clonePersona = async source => {
  const newName = prompt("New persona name (clone of " + source + "):",
                         source + "-copy");
  if (!newName) return;
  try {
    await api("personas/clone", {method: "POST",
                                 body: {source, new_name: newName.trim()}});
    toast("Cloned " + source + " → " + newName); render();
  } catch (e) { toast(e.message, true); }
};
}
/* Read the MCP checklist back into a preferred_mcp_tools list. Writes the
   checked tool NAMES, and preserves any prior entries that don't correspond
   to a currently-listed tool or server (offline servers, unknown names) so
   editing never silently drops config the UI can't currently show. A prior
   server-shorthand whose server IS listed is dropped in favor of the explicit
   tool names it auto-checked — behaviorally identical, just clearer. */
function readPreferredMcp(prevList) {
  const boxes = [...document.querySelectorAll("#pe-mcp input[type=checkbox]")];
  const checked = boxes.filter(b => b.checked).map(b => b.value);
  const listedNames = new Set(boxes.map(b => b.value));
  const listedServers = new Set(boxes.map(b => b.dataset.server).filter(Boolean));
  const preserved = (prevList || []).filter(
    e => !listedNames.has(e) && !listedServers.has(e));
  return [...new Set([...checked, ...preserved])];
}
window.editPersona = name => {
  const p = window._personas[name]; if (!p) return;
  $("#pe-title").textContent = "Edit " + name;
  document.querySelector("#pe-name").closest(".card")
    .scrollIntoView({behavior: "smooth", block: "start"});
  $("#pe-name").value = p.virtual_name;
  $("#pe-desc").value = p.description || "";
  $("#pe-cat").value = p.benchmark_category || "general_chat";
  $("#pe-bias").value = p.local_bias_strength || "moderate";
  $("#pe-enabled").checked = !!p.enabled;
  $("#pe-trig").value = p.escalation_triggers || "[]";
  // Check a tool if its name OR its server is preferred — mirrors the actual
  // match logic (a server entry attaches all its tools), so server-shorthand
  // shows as fully checked instead of appearing unset.
  const pref = new Set(parseTags(p.preferred_mcp_tools));
  document.querySelectorAll("#pe-mcp input[type=checkbox]").forEach(b => {
    b.checked = pref.has(b.value) || (!!b.dataset.server && pref.has(b.dataset.server));
  });
  $("#pe-guard").value = p.guardrail_overrides || "{}";
  $("#pe-pins").value = p.pinned_models || "[]";
  $("#pe-mode").value = p.execution_mode || "";
  $("#pe-check").checked = p.pipeline_check_enabled === null
    || p.pipeline_check_enabled === undefined || !!p.pipeline_check_enabled;
  $("#pe-judge").value = p.outcome_judge || "";
  $("#pe-reqtags").value = p.required_tags || "[]";
  $("#pe-perm").checked = !!p.prefer_permissive;
};

/* ----------------------------------------------------------------- tools -- */
async function tabTools() {

    <td>${t.disabled ? '<span class="pill bad">disabled</span>' : '<span class="pill ok">enabled</span>'}</td>
    <td><button class="act" onclick='run(api("tools/toggle",{method:"POST",body:{name:${JSON.stringify(t.name)},disabled:${!t.disabled}}}))'>

    <td><details><summary>desc</summary>${esc(t.description)}</details></td></tr>`).join("");

    <table><tr><th>tool</th><th>kind</th><th>target</th><th>state</th><th></th><th></th></tr>${rows}</table>`;
}

/* ----------------------------------------------------------------- usage -- */
function quotaCard(q) {
  const pill = k => {
    if (k.fable_scoped)
      return k.used >= q.thresholds.conserve_fable_at
        ? '<span class="pill bad">Fable conserved — use Opus</span>' : "";
    if (k.used >= q.thresholds.conserve_strong_at)
      return '<span class="pill bad">Haiku/local only</span>';
    if (k.used >= q.thresholds.conserve_premium_at)
      return '<span class="pill warn">Opus+ conserved</span>';
    return "";
  };
  // OAuth staleness (has silently corrupted usage figures twice): loudest
  // thing on the card the moment sources.oauth goes null — don't make anyone
  // discover it by comparing numbers with the Claude app again.
  const alerts = q.backends.filter(b => b.oauth_ok === false).map(b =>
    `<div class="row"><span class="pill bad">OAUTH STALE</span>
     <span>${esc(b.backend)}: Meridian's oauth quota source is NULL — the figures
     below are stale/partial${b.oauth_alert_since ? " (since " + esc(b.oauth_alert_since.slice(0, 19)) + " UTC)" : ""}.
     Fix on the host: <code>meridian profile login &lt;profile&gt; --headless</code></span></div>`);
  const credits = q.backends.filter(b => b.credits_used_usd !== null && b.credits_used_usd !== undefined)
    .map(b => `<div class="row"><label>${esc(b.backend)} · purchased credits</label>
     <b>$${b.credits_used_usd.toFixed(2)} used</b>
     <span class="hint">extra usage beyond the plan windows (last-resort policy)</span></div>`);
  const lines = q.backends.flatMap(b => {
    const out = (b.buckets || []).filter(k => k.used !== null && k.used !== undefined).map(k =>
      `<div class="row"><label>${esc(b.backend)} · ${esc(k.label)} window</label>
       <b>${Math.round(k.used * 100)}% used</b>
       ${k.resets_hhmm ? `<span class="hint">resets ${esc(k.resets_hhmm)}</span>` : ""}
       ${pill(k)}
      </div>`);
    // Observed-exhaustion / hard-unavailable state must be visible even when
    // the quota endpoint reports no buckets (the blind-sources case).
    if (b.available === false) {
      out.push(`<div class="row"><label>${esc(b.backend)}</label>
        <span class="pill bad">window unavailable</span>
        <span class="hint">${esc(b.note || "")}</span></div>`);
    }
    return out;
  });
  const o5 = q.observed.last_5h || {}, o7 = q.observed.last_7d || {};
  return `<div class="card">
    <h2 style="margin-top:0">Claude usage window (live from Meridian)</h2>
    ${alerts.join("")}${credits.join("")}
    ${lines.join("") || `<p class="hint">${q.backends.length
      ? "no usage signal yet (fresh window, or quota endpoint returned no buckets)"
      : "no Claude/subscription backend configured"}</p>`}
    <p class="hint">Observed through this router: ${o5.calls ?? 0} Claude calls /
    ${(o5.prompt_tokens ?? 0) + (o5.completion_tokens ?? 0)} tokens in the last 5h ·
    ${o7.calls ?? 0} calls / ${(o7.prompt_tokens ?? 0) + (o7.completion_tokens ?? 0)} tokens in 7d.
    Above ${Math.round(q.thresholds.conserve_premium_at * 100)}% the router conserves the premium tier;
    above ${Math.round(q.thresholds.conserve_strong_at * 100)}% only the cheapest Claude tier or local.</p>
  </div>`;
}

async function tabUsage() {
  const [d, q] = await Promise.all([api("usage?limit=100"), api("quota")]);
  // Per-request MCP/tool call trail (visibility spec item 5) — same
  // expandable-detail pattern as the Events tab.
  const toolCell = r => {
    const calls = Array.isArray(r.tool_calls) ? r.tool_calls : [];
    if (!calls.length) return "";
    const ok = calls.every(t => t.ok);
    return `<details><summary><span class="pill ${ok ? "ok" : "bad"}">${calls.length}</span></summary>
      ${calls.map(t => `<div class="mono nw">${t.ok ? "✓" : "✗"} ${esc(t.server)}/${esc(t.tool)}
        ${((t.duration_ms || 0) / 1000).toFixed(1)}s${t.error ? " — " + esc(t.error) : ""}</div>`).join("")}
      </details>`;
  };
  const rows = d.requests.map(r => `<tr>
    <td class="mono nw">${esc((r.ts || "").slice(0, 19))}</td>
    <td class="nw">${esc(r.persona || r.client_model)}</td><td class="nw">${esc(r.mode)}</td>
    <td>${esc(r.summary)}</td>
    <td class="mono">${(r.models_used || []).map(m => esc(m.model)).join(" → ")}</td>
    <td>${toolCell(r)}</td>
    <td>${r.steps ?? ""}</td><td class="nw">${r.duration_ms} ms</td>
    <td>${r.est_cost_usd ? "$" + r.est_cost_usd.toFixed(4) : ""}</td>
    <td>${(r.guardrail_events || []).length ? '<span class="pill warn">' + (r.guardrail_events || []).length + "</span>" : ""}</td>
    <td><span class="pill ${r.status === "ok" ? "ok" : r.status === "error" ? "bad" : "warn"}">${esc(r.status)}</span></td>
    </tr>`).join("");
  $("#main").innerHTML = `
    ${quotaCard(q)}
    <h2>Usage log — every routed request (§4.9 item 6)</h2>
    <table><tr><th>time (UTC)</th><th>persona</th><th>mode</th><th>request</th>
    <th>models used</th><th>tools</th><th>steps</th><th>time</th><th>cost</th><th>guard</th><th>status</th></tr>${rows}</table>`;
}

/* ---------------------------------------------------------------- events -- */
async function tabEvents() {
  const d = await api("events?limit=200");
  const rows = d.events.map(e => `<tr>
    <td class="mono nw">${esc((e.ts || "").slice(0, 19))}</td>
    <td><span class="pill ${e.level === "error" ? "bad" : e.level === "warning" ? "warn" : "ok"}">${esc(e.level)}</span></td>
    <td class="nw">${esc(e.source)}</td><td>${esc(e.message)}</td>
    <td><details><summary>detail</summary><span class="mono">${esc(e.detail || "")}</span></details></td>
    </tr>`).join("");
  $("#main").innerHTML = `
    <h2>Troubleshooting log — “why did it route weirdly” (§4.9 item 7)</h2>
    <table><tr><th>time (UTC)</th><th>level</th><th>source</th><th>message</th><th></th></tr>${rows}</table>`;
}

render();
