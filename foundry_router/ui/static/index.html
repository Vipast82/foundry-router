function mcpActivityCell(u) {
  if (!u || !u.calls) return '<span class="hint">idle</span>';
  const tools = Object.entries(u.tools || {}).map(([t, c]) => `${esc(t)}×${c}`).join(", ");
  const rl = u.rate_limited ? ` <span class="pill warn" title="429 rate-limited responses">${u.rate_limited}×429</span>` : "";
  return `<details><summary><span class="pill ${u.fail ? "warn" : "ok"}">${u.calls} calls</span>
      <span class="mono" style="color:var(--dim)"> ${u.ok}✓ ${u.fail ? u.fail + "✗" : ""}</span>${rl}</summary>
    <div class="trail">
      <div class="call">${tools || "—"}</div>
      <div class="call">last used ${esc((u.last_ts || "").slice(0, 19))} UTC</div>
      ${u.last_error ? `<div class="call err">last error — ${esc(u.last_error)}</div>` : ""}
    </div></details>`;
}

/* MCP > Gateway Servers (gateway-server admin spec): browse the Docker MCP
   Catalog and attach/detach servers on a live Docker MCP Gateway, no SSH.
   Every action here is a BACKEND-initiated MCP call (operator control panel) —
   never routed through a persona or model tool-loop. */
function gatewaySection(gw) {
  if (!gw || !(gw.gateways || []).length)
    return `<div class="card"><h2 style="margin-top:0">Gateway Servers</h2>
      <p class="hint">No Docker MCP Gateway connection detected. Add an MCP connection
      whose server exposes the gateway management tools (mcp-find / mcp-add) above,
      and this panel appears for browsing & attaching catalog servers.</p></div>`;
  const attached = (gw.attached || []).map(a => {
    const groups = (a.groups || []).map(g => `<tr>
      <td class="mono nw">${esc(g.name)}</td>
      <td class="mono">${(g.tools || []).map(esc).join(", ")}</td>
      <td class="nw">${g.removable
        ? `<button class="act" onclick='gwRemove(${JSON.stringify(g.name)}, ${JSON.stringify(a.gateway)})'>Remove</button>`
        : '<span class="hint">base / ungrouped</span>'}</td></tr>`).join("");
    return `<div style="margin-bottom:10px">
      <b class="mono">${esc(a.gateway)}</b> — <b>${a.tool_count}</b> attached tool(s)
      <table><tr><th>server (namespace)</th><th>tools</th><th></th></tr>
        ${groups || '<tr><td colspan="3" class="hint">no downstream tools attached</td></tr>'}</table>
      <div class="row"><label>remove by ref</label>
        <input class="gw-ref" data-gw="${esc(a.gateway)}" size="24" placeholder="exact server ref">
        <button class="act" onclick='gwRemoveByRef(${JSON.stringify(a.gateway)})'>Remove server</button></div>
    </div>`;
  }).join("");
  return `<div class="card">
    <h2 style="margin-top:0">Gateway Servers — Docker MCP Catalog <span class="pill warn" title="Operator-only. These are backend admin calls (mcp-add/mcp-remove) over the whole gateway — never exposed to any persona or model.">operator-only</span></h2>
    <p class="hint">Browse the catalog and attach/detach servers on the live gateway without SSH.
      Adding/removing runs the gateway's own management tools from Foundry's backend, then re-runs
      Tool Sync so the change shows up. Servers that need <b>secrets</b> can't be added here yet
      (no remote path to the gateway's secrets.env — see docs/GATEWAY_SERVERS.md).</p>
    <div class="row">
      <input id="gw-q" size="30" placeholder="search the catalog, e.g. playwright">
      <button class="act primary" id="gw-search">Search catalog ▶</button>
      <span id="gw-status" class="hint"></span>
    </div>
    <div id="gw-results"></div>
    <h2 style="font-size:15px">Currently attached (from Tool Sync)</h2>
    ${attached || '<p class="hint">nothing attached</p>'}
  </div>`;
}

function wireGateway(gw) {
  if (!gw || !(gw.gateways || []).length) return;
  const primary = gw.gateways[0];
  const run = async (fn) => { try { await fn(); } catch (e) { toast(e.message, true); } };
  $("#gw-search").onclick = () => run(async () => {
    const q = $("#gw-q").value.trim();
    const status = $("#gw-status"), out = $("#gw-results");
    status.textContent = "searching…"; out.innerHTML = "";
    const r = await api("gateway/find", {method: "POST", body: {gateway: primary, query: q}});
    status.textContent = `${(r.results || []).length} result(s)`;
    if (!(r.results || []).length) {
      out.innerHTML = `<p class="hint">No parsed results. Raw gateway output:</p>
        <pre class="mono" style="white-space:pre-wrap;max-height:220px;overflow:auto">${esc(r.raw || "")}</pre>`;
      return;
    }
    // config badge is tri-state and SEPARATE from secrets: a server can need
    // non-secret config yet no secrets (the case that failed silently on add).
    const cfgBadge = s => s.config_required === true
      ? '<span class="pill warn" title="Needs non-secret config values set (via docker mcp config-set / SSH) before it will work">config needed</span>'
      : s.config_required === false ? '<span class="pill ok">none</span>'
      : '<span class="hint" title="mcp-find did not report config info for this server — expand raw to check, or docker mcp catalog server inspect on the host">—</span>';
    out.innerHTML = `<table><tr><th>server</th><th>publisher</th><th>description</th>
        <th title="tools this server exposes, per mcp-find">tools</th>
        <th title="non-secret required config, separate from secrets">config</th>
        <th>secrets</th><th></th></tr>
      ${r.results.map(s => `<tr>
        <td class="mono nw">${esc(s.name)}${s.ref !== s.name ? `<br><span class="hint">${esc(s.ref)}</span>` : ""}</td>
        <td class="nw">${esc(s.publisher || "—")}</td>
        <td>${esc(s.description || "")}
          <details><summary style="cursor:pointer;font-size:11px;color:var(--dim)">raw</summary><pre class="mono" style="white-space:pre-wrap;max-width:560px">${esc(JSON.stringify(s.raw, null, 2))}</pre></details></td>
        <td class="nw">${s.tools == null ? '<span class="hint" title="mcp-find did not report a tool count — expand raw to see the payload">?</span>' : s.tools}</td>
        <td class="nw">${cfgBadge(s)}</td>
        <td class="nw">${s.requires_secrets ? '<span class="pill bad">requires secrets</span>' : '<span class="pill ok">none</span>'}</td>
        <td class="nw">${s.requires_secrets
          ? '<button class="act" disabled title="This server needs secrets. Adding it requires a companion service on the gateway host to write secrets.env — not available yet. Attach it manually via SSH for now.">Add</button>'
          : `<button class="act primary" onclick='gwAdd(${JSON.stringify(s.ref)}, ${JSON.stringify(primary)})'>Add</button>`}</td>
      </tr>`).join("")}</table>
      <details style="margin-top:6px"><summary class="hint" style="cursor:pointer">show raw mcp-find response (the untouched payload — use this to confirm which fields exist before we tune the parser)</summary>
        <pre class="mono" style="white-space:pre-wrap;max-height:320px;overflow:auto">${esc(r.raw || "")}</pre></details>`;
  });
}

window.gwAdd = async (ref, gateway) => {
  try {
    $("#gw-status") && ($("#gw-status").textContent = `adding ${ref}…`);
    const r = await api("gateway/add", {method: "POST", body: {gateway, ref}});
    const added = (r.sync && r.sync.added || []).length;
    toast(`Added ${ref} — Tool Sync picked up ${added} new tool(s)`);
    render();
  } catch (e) { toast(e.message, true); }
};
window.gwRemove = async (ref, gateway) => {
  if (!confirm(`Remove "${ref}" from the gateway?\n\nAny persona granted its tools loses them, and it disappears from Tool Sync.`)) return;
  try {
    const r = await api("gateway/remove", {method: "POST", body: {gateway, ref}});
    const removed = (r.sync && r.sync.removed || []).length;
    toast(`Removed ${ref} — Tool Sync dropped ${removed} tool(s)`);
    render();
  } catch (e) { toast(e.message, true); }
};
window.gwRemoveByRef = (gateway) => {
  const inp = [...document.querySelectorAll(".gw-ref")].find(i => i.dataset.gw === gateway);
  const ref = inp && inp.value.trim();
  if (!ref) { toast("enter a server ref", true); return; }
  window.gwRemove(ref, gateway);
};

async function tabMCP() {
  const [d, gw] = await Promise.all([api("mcp_servers"), api("gateway/servers")]);
  const rows = d.servers.map(s => `<tr>
    <td>${esc(s.name)}${s.executes_code
      ? ' <span class="pill bad" title="This server EXECUTES CODE — full-code audit trail, network/limits enforced by config, per-persona opt-in only">⚠ code exec</span>' : ""}</td>
    <td class="mono">${esc(s.url)}</td><td>${esc(s.transport)}</td>
    <td class="nw">${s.timeout_seconds ?? 300}s${(s.pace_seconds ?? 0) > 0 ? ` · ${s.pace_seconds}s gap` : ""}</td>
    <td class="nw">${s.has_token
        ? '<span class="pill ok" title="' + esc(s.token_header) + '">token set</span> <a href="#" data-cleartoken="' + esc(s.name) + '">clear</a>'
        : '<span class="hint">none</span>'}</td>
    <td class="nw"><span class="mcp-status" data-mcp="${esc(s.name)}">${s.tool_count
        ? '<span class="pill ok">' + s.tool_count + ' tools</span>'
        : '<span class="hint">no tools synced</span>'}</span></td>
    <td>${mcpActivityCell(s.usage)}</td>
    <td class="nw"><button class="act" onclick='testMcp(${JSON.stringify(s.name)})'>test</button>
      <button class="act" onclick='editMcp(${JSON.stringify(s.name)})'>edit</button>
      <button class="act" onclick='run(api("mcp_servers/delete",{method:"POST",body:{name:${JSON.stringify(s.name)}}}))'>remove</button></td>
    </tr>`).join("");
  window._mcpServers = Object.fromEntries(d.servers.map(s => [s.name, s]));
  window.testMcp = async name => {
    const el = [...document.querySelectorAll(".mcp-status")].find(x => x.dataset.mcp === name);
    if (el) el.textContent = "probing…";
    try {
      const r = await api("mcp_servers/test", {method: "POST", body: {name}});
      if (!el) return;
      el.innerHTML = r.ok
        ? '<span class="pill ok" title="' + esc((r.tools || []).join(", ")) + '">reachable · ' + r.tool_count + ' tools</span>'
        : '<span class="pill bad" title="' + esc(r.error) + '">unreachable</span>';
      if (!r.ok) toast(name + ": " + r.error, true);
    } catch (e) { if (el) el.innerHTML = '<span class="pill bad">error</span>'; toast(e.message, true); }
  };
  $("#main").innerHTML = `
    <h2>MCP server connections (§4.9 item 8)</h2>
    <p class="hint">A connection list, not a tool list — tools are discovered automatically
    per server by Tool Sync once a connection exists.</p>
    <table><tr><th>name</th><th>url</th><th>transport</th><th>timeout / pace</th><th>auth token</th><th>status</th><th>activity</th><th></th></tr>${rows}</table>
    <div class="card">
      <div class="row"><label>name</label><input id="mcp-name" size="16">
      <label>url</label><input id="mcp-url" size="38" placeholder="http://host:port/mcp">
      <label>transport</label><select id="mcp-tr"><option>streamable-http</option><option>sse</option></select>
      <label title="Per-server tool-call budget. Media generation (ComfyUI/TTS/music) can need 600-1800s; search tools should fail fast.">timeout (s)</label>
      <input id="mcp-to" type="number" size="6" value="300">
      <label title="Minimum gap between calls to this server, applied to EVERY caller (research sweep, worker tool loop, brain). SearXNG 429s a burst of queries — set 2-5s here to space them. 0 = off.">pace (s)</label>
      <input id="mcp-pace" type="number" step="0.5" size="5" value="0" title="min seconds between calls (SearXNG: try 3)">
      <label title="On a 429, how many extra attempts before giving up (default 3).">429 retries</label>
      <input id="mcp-retries" type="number" size="4" value="3">
      <label title="Base seconds to wait between 429 retries; escalates each attempt (attempt×base). Default 30.">429 backoff (s)</label>
      <input id="mcp-backoff" type="number" step="1" size="5" value="30"></div>
      <div class="row">
      <label title="Auth token stored in the DB (NOT config.yaml — stored in plaintext, same as config). Sent as 'Authorization: Bearer <token>' by default, or as the raw value of the header you name. Leave blank when editing a server to keep its existing token.">auth token</label>
      <input id="mcp-token" type="password" size="26" placeholder="secret — saved to DB, leave blank to keep">
      <label title="Header the token is sent in. 'Authorization' (default) sends 'Bearer <token>'; any other name (e.g. x-api-key) sends the raw token.">header</label>
      <input id="mcp-hdr" size="16" value="Authorization"></div>
      <div class="row" style="border-top:1px solid var(--border, #333);padding-top:8px">
        <label title="Mark this server as one that EXECUTES CODE (e.g. a code sandbox). Enables the full-code audit trail, the per-persona ⚠ badge, and the sandbox controls below. Nothing is special-cased by name — this is the only switch.">⚠ executes code</label>
        <input type="checkbox" id="mcp-exec">
        <span class="hint">enables sandbox controls + full-code audit trail</span></div>
      <div id="mcp-sandbox" class="row" style="display:none">
        <label title="CPU cores passed to the sandbox as a call default (config wins over the model). Real enforcement is the sandbox container's cgroup limit — set it there too; a container restart may be needed.">CPU cores</label>
        <input id="mcp-cpus" type="number" step="0.5" min="0" size="5" value="1">
        <label title="Memory cap (MB) passed as a call default. Hard enforcement is the container's --memory limit on the sandbox host.">memory (MB)</label>
        <input id="mcp-mem" type="number" step="128" min="0" size="7" value="512">
        <label title="Network access. OFF (default) is force-applied over the model's request, so a model cannot enable network itself. The real block is the container's --network none — keep both aligned.">network access</label>
        <input type="checkbox" id="mcp-net"></div>
      <div id="mcp-sandbox2" class="row" style="display:none">
        <label title="Advanced: extra call defaults as JSON, force-merged over the model's arguments (config wins). Use this to match the exact argument names YOUR sandbox expects — nothing is hardcoded. The CPU/memory/network fields above write into cpus/memory_mb/network keys; anything here is merged alongside.">extra call_defaults (JSON)</label>
        <input id="mcp-defaults" size="60" value="{}" placeholder='{"language": "python"}'></div>
      <div class="row">
      <button class="act primary" id="mcp-add">Save server</button>
      <button class="act" id="mcp-clear" title="Clear the form to add a new server">new</button></div>
    </div>
    ${gatewaySection(gw)}`;
  wireGateway(gw);
  const syncSandboxVis = () => {
    const on = $("#mcp-exec").checked;
    $("#mcp-sandbox").style.display = on ? "" : "none";
    $("#mcp-sandbox2").style.display = on ? "" : "none";
  };
  $("#mcp-exec").onchange = syncSandboxVis;
  window.editMcp = name => {
    const s = (window._mcpServers || {})[name]; if (!s) return;
    $("#mcp-name").value = s.name;
    $("#mcp-url").value = s.url;
    $("#mcp-tr").value = s.transport;
    $("#mcp-to").value = s.timeout_seconds ?? 300;
    $("#mcp-pace").value = s.pace_seconds ?? 0;
    $("#mcp-retries").value = s.rate_limit_retries ?? 3;
    $("#mcp-backoff").value = s.rate_limit_backoff_seconds ?? 30;
    $("#mcp-hdr").value = s.token_header || "Authorization";
    $("#mcp-token").value = "";   // write-only — blank keeps the existing token
    $("#mcp-token").placeholder = s.has_token
      ? "token is set — leave blank to keep, or type to replace"
      : "secret — saved to DB, leave blank to keep";
    // Sandbox controls: the CPU/mem/network steppers read the conventional
    // keys out of call_defaults; anything else stays in the raw JSON field.
    $("#mcp-exec").checked = !!s.executes_code;
    const cd = {...(s.call_defaults || {})};
    $("#mcp-cpus").value = cd.cpus ?? 1;
    $("#mcp-mem").value = cd.memory_mb ?? 512;
    $("#mcp-net").checked = !!cd.network;
    delete cd.cpus; delete cd.memory_mb; delete cd.network;
    $("#mcp-defaults").value = JSON.stringify(cd);
    syncSandboxVis();
    document.querySelector("#mcp-name").closest(".card")
      .scrollIntoView({behavior: "smooth", block: "nearest"});
  };
  $("#mcp-clear").onclick = () => {
    for (const id of ["mcp-name", "mcp-url", "mcp-token"]) $("#" + id).value = "";
    $("#mcp-to").value = 300; $("#mcp-pace").value = 0; $("#mcp-hdr").value = "Authorization";
    $("#mcp-retries").value = 3; $("#mcp-backoff").value = 30;
    $("#mcp-tr").value = "streamable-http";
    $("#mcp-exec").checked = false; $("#mcp-cpus").value = 1; $("#mcp-mem").value = 512;
    $("#mcp-net").checked = false; $("#mcp-defaults").value = "{}"; syncSandboxVis();
  };
  $("#mcp-add").onclick = async () => {
    const name = $("#mcp-name").value.trim(), url = $("#mcp-url").value.trim();
    if (!name || !url) { toast("name and url required", true); return; }
    // Assemble call_defaults: extra JSON first, then the typed sandbox keys on
    // top (so the steppers are authoritative for cpus/memory_mb/network).
    let callDefaults = {};
    if ($("#mcp-exec").checked) {
      try { callDefaults = JSON.parse($("#mcp-defaults").value || "{}"); }
      catch (e) { toast("extra call_defaults is not valid JSON", true); return; }
      callDefaults.cpus = +$("#mcp-cpus").value || 0;
      callDefaults.memory_mb = +$("#mcp-mem").value || 0;
      callDefaults.network = $("#mcp-net").checked;
    }
    try {
      await api("mcp_servers", {method: "POST", body: {
        name, url, transport: $("#mcp-tr").value,
        timeout_seconds: +$("#mcp-to").value || 300,
        pace_seconds: +$("#mcp-pace").value || 0,
        rate_limit_retries: +$("#mcp-retries").value || 3,
        rate_limit_backoff_seconds: +$("#mcp-backoff").value || 30,
        executes_code: $("#mcp-exec").checked,
        call_defaults: callDefaults}});
      const tok = $("#mcp-token").value.trim();
      if (tok) await api("mcp_servers/token", {method: "POST", body: {
        server: name, token: tok, header: $("#mcp-hdr").value.trim() || "Authorization"}});
      toast("Saved"); render();
    } catch (e) { toast(e.message, true); }
  };
  $("#main").querySelectorAll("a[data-cleartoken]").forEach(a => a.onclick = async ev => {
    ev.preventDefault();
    try {
      await api("mcp_servers/token", {method: "POST", body: {server: a.dataset.cleartoken, token: ""}});
      render();
    } catch (e) { toast(e.message, true); }
  });
}

/* ---------------------------------------------------------------- ollama -- */
async function tabOllama() {
  clearInterval(window._ollamaPoll);
  const d = await api("ollama/backends");
  const bes = d.backends || [];
  if (!bes.length) {
    $("#main").innerHTML = `<h2>Ollama model management</h2>
      <p class="hint">No Ollama-type backend is configured. Add one on the
      <b>Backends</b> tab first, then manage its models here.</p>`;
    return;
  }
  if (!window._ollamaBackend || !bes.find(b => b.name === window._ollamaBackend))
    window._ollamaBackend = bes[0].name;
  const be = window._ollamaBackend;

  let models = [], loaded = [], tagErr = "";
  try {
    const t = await api("ollama/tags?backend=" + encodeURIComponent(be));
    if (t.ok) { models = t.models || []; loaded = t.loaded || []; } else tagErr = t.error;
  } catch (e) { tagErr = e.message; }
  const isLoaded = nm => loaded.includes(nm);

  const beOpts = bes.map(b => `<option ${b.name === be ? "selected" : ""}>${esc(b.name)}</option>`).join("");
  const gb = n => n ? (n / 1e9).toFixed(2) + " GB" : "";
  const nameOf = m => m.name || m.model || "";
  const modelRows = models.map(m => {
    const nm = nameOf(m), det = m.details || {};
    return `<tr>
      <td class="mono">${esc(nm)}${isLoaded(nm) ? ' <span class="pill ok" title="resident in VRAM now">⚡ loaded</span>' : ""}</td>
      <td class="nw">${gb(m.size)}</td>
      <td class="nw">${esc(det.parameter_size || "")}</td>
      <td class="nw">${esc(det.quantization_level || "")}</td>
      <td class="nw">
        <button class="act" onclick='ollShow(${JSON.stringify(nm)})'>show</button>
        <button class="act" onclick='ollCopy(${JSON.stringify(nm)})'>copy</button>
        <button class="act" onclick='ollRename(${JSON.stringify(nm)})'>rename</button>
        <button class="act" onclick='ollPush(${JSON.stringify(nm)})'>push</button>
        <button class="act" onclick='ollDelete(${JSON.stringify(nm)})'>delete</button>
      </td></tr>`;
  }).join("");

  $("#main").innerHTML = `
    <h2>Ollama model management</h2>
    <div class="row"><label>backend</label><select id="oll-be">${beOpts}</select>
      <span class="hint">Add / pull / copy / rename / delete models directly on this Ollama host via its REST API.</span></div>
    ${tagErr ? `<p class="hint"><span class="pill bad">unreachable</span> ${esc(tagErr)}</p>` : ""}
    <div id="oll-jobs"></div>
    <h2>Installed models (${models.length})</h2>
    <table><tr><th>model</th><th>size</th><th>params</th><th>quant</th><th></th></tr>${modelRows}</table>
    <pre id="oll-detail" class="mono" style="display:none;white-space:pre-wrap;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:10px;max-height:340px;overflow:auto"></pre>

    <div class="card">
      <h2 style="margin-top:0">Pull a model</h2>
      <div class="row"><label>model name</label>
        <input id="oll-pull" size="30" placeholder="e.g. llama3.1:8b">
        <button class="act primary" id="oll-pull-btn">Pull</button></div>
      <p class="hint">Downloads from the Ollama registry onto this host. Large models take a while — progress shows above.</p>
    </div>

    <div class="card">
      <h2 style="margin-top:0">Create a model (pseudo-model)</h2>
      <div class="row"><label>new name</label><input id="oll-cr-name" size="22" placeholder="my-assistant:latest">
        <label>from (base)</label><input id="oll-cr-from" size="22" placeholder="llama3.1:8b"></div>
      <div class="row"><label>system prompt</label>
        <textarea id="oll-cr-sys" rows="2" placeholder="You are..."></textarea></div>
      <details><summary>advanced: raw Modelfile (overrides the fields above)</summary>
        <textarea id="oll-cr-file" rows="4" placeholder="FROM llama3.1:8b
SYSTEM You are a helpful assistant."></textarea></details>
      <div class="row"><button class="act primary" id="oll-cr-btn">Create</button>
        <span class="hint">Bakes a system prompt/params into a named model. A raw Modelfile is parsed into Ollama's structured create fields (FROM → from, SYSTEM, PARAMETER…). Needs a FROM/base.</span></div>
    </div>`;

  $("#oll-be").onchange = e => { window._ollamaBackend = e.target.value; render(); };

  window.ollShow = async name => {
    const el = $("#oll-detail");
    try {
      const r = await api("ollama/show", {method: "POST", body: {backend: be, model: name}});
      if (!r.ok) { toast(r.error, true); return; }
      const i = r.info || {};
      el.style.display = "block";
      el.textContent = name + "\n\n"
        + (i.details ? "details: " + JSON.stringify(i.details, null, 2) + "\n\n" : "")
        + (i.parameters ? "parameters:\n" + i.parameters + "\n\n" : "")
        + (i.template ? "template:\n" + i.template + "\n\n" : "")
        + (i.system ? "system:\n" + i.system + "\n\n" : "")
        + (i.modelfile ? "modelfile:\n" + i.modelfile : "");
      el.scrollIntoView({behavior: "smooth", block: "nearest"});
    } catch (e) { toast(e.message, true); }
  };
  const act = async (path, body, okMsg) => {
    try {
      const r = await api("ollama/" + path, {method: "POST", body});
      if (r.ok) { toast(okMsg); render(); } else toast(r.error, true);
    } catch (e) { toast(e.message, true); }
  };
  window.ollCopy = name => {
    const dst = prompt("Copy '" + name + "' to a new (pseudo) name:", name.replace(/:.*/, "") + "-copy");
    if (dst) act("copy", {backend: be, source: name, destination: dst}, "Copied to " + dst);
  };
  window.ollRename = name => {
    const dst = prompt("Rename '" + name + "' to (copy + delete original):", name);
    if (dst && dst !== name) act("rename", {backend: be, source: name, destination: dst}, "Renamed to " + dst);
  };
  window.ollDelete = name => {
    if (confirm("Permanently DELETE '" + name + "' from " + be + "? This removes the model files from the host."))
      act("delete", {backend: be, model: name}, "Deleted " + name);
  };
  window.ollPush = async name => {
    if (!confirm("Push '" + name + "' to the Ollama registry? Requires the host to be logged in and a namespaced name (user/model).")) return;
    try { await api("ollama/push", {method: "POST", body: {backend: be, model: name}}); toast("Push started"); pollJobs(); }
    catch (e) { toast(e.message, true); }
  };
  $("#oll-pull-btn").onclick = async () => {
    const m = $("#oll-pull").value.trim(); if (!m) { toast("model name required", true); return; }
    try { await api("ollama/pull", {method: "POST", body: {backend: be, model: m}}); toast("Pull started"); pollJobs(); }
    catch (e) { toast(e.message, true); }
  };
  $("#oll-cr-btn").onclick = async () => {
    const name = $("#oll-cr-name").value.trim(); if (!name) { toast("new name required", true); return; }
    try {
      await api("ollama/create", {method: "POST", body: {backend: be, model: name,
        from: $("#oll-cr-from").value.trim(), system: $("#oll-cr-sys").value,
        modelfile: $("#oll-cr-file").value}});
      toast("Create started"); pollJobs();
    } catch (e) { toast(e.message, true); }
  };

  function renderJobs(jobs) {
    const el = $("#oll-jobs"); if (!el) return;
    jobs = (jobs || []).filter(j => j.backend === be);
    if (!jobs.length) { el.innerHTML = ""; return; }
    el.innerHTML = `<div class="card"><h2 style="margin-top:0">Tasks</h2>` + jobs.map(j => {
      const cls = j.state === "error" ? "bad" : j.state === "done" ? "ok" : "warn";
      const txt = j.state === "running"
        ? esc(j.status_text || "working") + " · " + (j.percent || 0) + "%"
        : esc(j.state) + (j.error ? " — " + esc(j.error) : "");
      return `<div class="row"><span class="pill ${cls}">${esc(j.op)}</span>
        <span class="mono">${esc(j.model)}</span><span class="hint">${txt}</span></div>`;
    }).join("") + `</div>`;
  }
  function pollJobs() {
    clearInterval(window._ollamaPoll);
    window._ollamaPoll = setInterval(async () => {
      if (current !== "Ollama") { clearInterval(window._ollamaPoll); return; }
      try {
        const j = await api("ollama/jobs");
        renderJobs(j.jobs);
        if (!(j.jobs || []).some(x => x.state === "running")) clearInterval(window._ollamaPoll);
      } catch (e) { /* transient */ }
    }, 1500);
  }
  renderJobs(d.jobs);
  if ((d.jobs || []).some(j => j.state === "running")) pollJobs();
}

/* ----------------------------------------------------------------- usage -- */
function quotaCard(q) {
  const pill = k => {
    if (k.fable_scoped)
      return k.used >= q.thresholds.conserve_fable_at
        ? '<span class="pill bad">Fable conserved — use Opus</span>' : "";
    if (k.used >= q.thresholds.conserve_strong_at)
      return '<span class="pill bad">Haiku/local only</span>';
    if (k.used >= q.thresholds.conserve_premium_at)
      return '<span class="pill warn">Opus+ conserved</span>';
    return "";
  };
  // OAuth staleness (has silently corrupted usage figures twice): loudest
  // thing on the card the moment sources.oauth goes null — don't make anyone
  // discover it by comparing numbers with the Claude app again.
  const alerts = q.backends.filter(b => b.oauth_ok === false).map(b =>
    `<div class="row"><span class="pill bad">OAUTH STALE</span>
     <span>${esc(b.backend)}: Meridian's oauth quota source is NULL — the figures
     below are stale/partial${b.oauth_alert_since ? " (since " + esc(b.oauth_alert_since.slice(0, 19)) + " UTC)" : ""}.
     Fix on the host: <code>meridian profile login &lt;profile&gt; --headless</code></span></div>`);
  const credits = q.backends.filter(b => b.credits_used_usd !== null && b.credits_used_usd !== undefined)
    .map(b => `<div class="row"><label>${esc(b.backend)} · purchased credits</label>
     <b>$${b.credits_used_usd.toFixed(2)} used</b>
     <span class="hint">extra usage beyond the plan windows (last-resort policy)</span></div>`);
  const lines = q.backends.flatMap(b => {
    const out = (b.buckets || []).filter(k => k.used !== null && k.used !== undefined).map(k =>
      `<div class="row"><label>${esc(b.backend)} · ${esc(k.label)} window</label>
       <b>${Math.round(k.used * 100)}% used</b>
       ${k.resets_hhmm ? `<span class="hint">resets ${esc(k.resets_hhmm)}</span>` : ""}
       ${pill(k)}
      </div>`);
    // Observed-exhaustion / hard-unavailable state must be visible even when
    // the quota endpoint reports no buckets (the blind-sources case).
    if (b.available === false) {
      out.push(`<div class="row"><label>${esc(b.backend)}</label>
        <span class="pill bad">window unavailable</span>
        <span class="hint">${esc(b.note || "")}</span></div>`);
    }
    return out;
  });
  const o5 = q.observed.last_5h || {}, o7 = q.observed.last_7d || {};
  return `<div class="card">
    <h2 style="margin-top:0">Claude usage window (live from Meridian)</h2>
    ${alerts.join("")}${credits.join("")}
    ${lines.join("") || `<p class="hint">${q.backends.length
      ? "no usage signal yet (fresh window, or quota endpoint returned no buckets)"
      : "no Claude/subscription backend configured"}</p>`}
    <p class="hint">Observed through this router: ${o5.calls ?? 0} Claude calls /
    ${(o5.prompt_tokens ?? 0) + (o5.completion_tokens ?? 0)} tokens in the last 5h ·
    ${o7.calls ?? 0} calls / ${(o7.prompt_tokens ?? 0) + (o7.completion_tokens ?? 0)} tokens in 7d.
    Above ${Math.round(q.thresholds.conserve_premium_at * 100)}% the router conserves the premium tier;
    above ${Math.round(q.thresholds.conserve_strong_at * 100)}% only the cheapest Claude tier or local.</p>
  </div>`;
}

// ms -> compact human string (244478 ms reads awful; "4m 4s" doesn't).
function fmtDur(ms) {
  if (ms == null) return "";
  if (ms >= 60000) return `${Math.floor(ms / 60000)}m ${Math.round((ms % 60000) / 1000)}s`;
  if (ms >= 1000) return `${(ms / 1000).toFixed(1)}s`;
  return `${ms} ms`;
}

// A request's mode, made legible. "direct"/"passthrough" both mean Foundry did
// NOT run its brain or its own MCP tools, so they're flagged, not left cryptic.
function modeBadge(m) {
  if (m === "direct")
    return `<span class="pill warn" title="The client (e.g. AnythingLLM @agent) sent its own tools. Foundry forwarded them to one model and did NOT use its own MCP servers, tool loop, or routing brain.">direct · client tools</span>`;
  if (m === "passthrough")
    return `<span class="pill warn" title="A raw backend model was requested by name — no Foundry routing.">passthrough</span>`;
  return `<span class="nw">${esc(m || "")}</span>`;
}

async function tabUsage() {
  const [d, q, ce] = await Promise.all([
    api("usage?limit=100"), api("quota"), api("tool_calls?executed_code=1&limit=50")]);
  const reqs = d.requests || [];

  // ---- Code-execution audit (the sandbox's strongest audit trail) ---------------
  const codeCalls = ce.tool_calls || [];
  const codeCard = codeCalls.length ? `<div class="card" style="border-left:3px solid var(--bad, #a43)">
    <h2 style="margin-top:0">⚠ Code-execution audit — last ${codeCalls.length} sandbox call(s)</h2>
    <p class="hint">Every code execution is captured here with the exact submitted code. This is the
      highest-risk tool in the stack; treat this log as the record of what actually ran.</p>
    <table><tr><th>time (UTC)</th><th>persona</th><th>caller</th><th>server/tool</th>
      <th>result</th><th>code</th></tr>
    ${codeCalls.map(c => {
      let code = "";
      try { const a = JSON.parse(c.arguments || "{}");
            code = a.code || a.source || a.script || c.arguments || ""; }
      catch (e) { code = c.arguments || ""; }
      return `<tr>
        <td class="mono nw">${esc((c.ts || "").slice(0, 19))}</td>
        <td class="nw">${esc(c.persona || "")}</td>
        <td class="mono nw">${esc(c.caller || "")}</td>
        <td class="mono nw">${esc(c.server)}/${esc(c.tool)}</td>
        <td><span class="pill ${c.ok ? "ok" : "bad"}">${c.ok ? "ok" : "fail"}</span>
          ${c.error ? `<span class="err" title="${esc(c.error)}">✗</span>` : ""}
          <span class="mono" style="color:var(--dim)">${fmtDur(c.duration_ms || 0)}</span></td>
        <td><details><summary>view</summary><pre class="mono" style="white-space:pre-wrap;max-width:640px">${esc(code)}</pre></details></td>
      </tr>`;
    }).join("")}</table></div>` : "";

  // ---- MCP usage, aggregated separately from "which model answered" -------------
  // This card answers "is the TrueNAS worker actually using Foundry's MCP servers,
  // and separately from which model it picked?" A request in `direct` mode never
  // touches these servers (the client brought its own tools), which is exactly why
  // an AnythingLLM @agent session shows nothing here.
  const agg = {};            // server -> {n, ok, fail, ms, lastErr, tools:{}}
  let mcpReqs = 0;
  for (const r of reqs) {
    const calls = Array.isArray(r.tool_calls) ? r.tool_calls : [];
    if (calls.length) mcpReqs++;
    for (const t of calls) {
      const s = agg[t.server] || (agg[t.server] = { n: 0, ok: 0, fail: 0, ms: 0, lastErr: "", tools: {} });
      s.n++; s.ms += t.duration_ms || 0;
      s.tools[t.tool] = (s.tools[t.tool] || 0) + 1;
      if (t.ok) s.ok++; else { s.fail++; if (t.error) s.lastErr = t.error; }
    }
  }
  const servers = Object.keys(agg).sort();
  const mcpRows = servers.map(name => {
    const s = agg[name];
    const tools = Object.entries(s.tools).map(([t, c]) => `${esc(t)}×${c}`).join(", ");
    return `<tr>
      <td class="nw"><b>${esc(name)}</b></td>
      <td class="mono">${tools}</td>
      <td class="nw">${s.n}</td>
      <td class="nw"><span class="pill ok">${s.ok} ok</span>${s.fail ? ` <span class="pill bad">${s.fail} fail</span>` : ""}</td>
      <td class="nw">${fmtDur(Math.round(s.ms / s.n))} avg</td>
      <td class="trail" style="border:0"><span class="call ${s.lastErr ? "err" : ""}">${esc(s.lastErr || "—")}</span></td>
    </tr>`;
  }).join("");
  const mcpCard = `<div class="card">
    <h2 style="margin-top:0">MCP tool usage — Foundry's own servers (last ${reqs.length} requests)</h2>
    ${servers.length
      ? `<table><tr><th>server</th><th>tools used</th><th>calls</th><th>result</th><th>latency</th><th>last error</th></tr>${mcpRows}</table>
         <p class="hint"><b>${mcpReqs}</b> of ${reqs.length} request(s) used a Foundry MCP server.
         <b>direct · client tools</b> requests are not counted here — the client brought its own tools, so
         Foundry's MCP servers (searxng / crawl4ai / …) were bypassed.</p>`
      : `<p class="hint">No Foundry MCP tool calls in the last ${reqs.length} requests. If your client is
         <b>AnythingLLM in @agent mode</b>, it runs its own web tools (DuckDuckGo) and hits Foundry in
         <b>direct</b> mode, which bypasses Foundry's MCP servers. To let the worker use Foundry's
         searxng / crawl4ai tools, send a <b>normal chat</b> (turn @agent off).</p>`}
  </div>`;

  // ---- per-request trail --------------------------------------------------------
  const toolCell = r => {
    const calls = Array.isArray(r.tool_calls) ? r.tool_calls : [];
    if (!calls.length) return `<span class="hint">—</span>`;
    const ok = calls.every(t => t.ok);
    const byServer = {};
    for (const t of calls) byServer[t.server] = (byServer[t.server] || 0) + 1;
    const chips = Object.entries(byServer).map(([s, c]) => `${esc(s)}×${c}`).join(" · ");
    return `<details><summary><span class="pill ${ok ? "ok" : "bad"}">${calls.length}</span>
        <span class="mono" style="color:var(--dim)"> ${chips}</span></summary>
      <div class="trail">${calls.map(t => `<div class="call">${t.ok ? "✓" : "✗"}
        ${esc(t.server)}/${esc(t.tool)} · ${fmtDur(t.duration_ms || 0)}${
        t.error ? ` <span class="err">— ${esc(t.error)}</span>` : ""}</div>`).join("")}</div>
      </details>`;
  };
  // Thumbs feedback (quality tracking Phase 1): rate any routed request from
  // the router itself, regardless of which client served the conversation.
  const fbCell = r => `<span class="nw">
    <button class="act" style="padding:2px 6px${r.feedback === 1 ? ";outline:2px solid var(--ok, #3a4)" : ""}"
      title="thumbs up" onclick="sendFeedback(${r.id}, 1)">👍</button>
    <button class="act" style="padding:2px 6px${r.feedback === -1 ? ";outline:2px solid var(--bad, #a43)" : ""}"
      title="thumbs down" onclick="sendFeedback(${r.id}, -1)">👎</button></span>`;
  const rows = reqs.map(r => `<tr>
    <td class="mono nw">${esc((r.ts || "").slice(0, 19))}</td>
    <td class="nw">${esc(r.persona || r.client_model)}</td>
    <td>${modeBadge(r.mode)}</td>
    <td>${esc(r.summary)}</td>
    <td class="mono">${(r.models_used || []).map(m => esc(m.model)).join(" → ") || '<span class="hint">—</span>'}</td>
    <td>${toolCell(r)}</td>
    <td>${r.steps ?? ""}</td>
    <td class="nw">${fmtDur(r.duration_ms)}</td>
    <td>${r.est_cost_usd ? "$" + r.est_cost_usd.toFixed(4) : ""}</td>
    <td>${(r.guardrail_events || []).length ? '<span class="pill warn">' + (r.guardrail_events || []).length + "</span>" : ""}</td>
    <td><span class="pill ${r.status === "ok" ? "ok" : r.status === "error" ? "bad" : "warn"}">${esc(r.status)}</span></td>
    <td>${fbCell(r)}</td>
    </tr>`).join("");
  $("#main").innerHTML = `
    ${quotaCard(q)}
    ${codeCard}
    ${mcpCard}
    <div class="row" style="justify-content:space-between;align-items:baseline">
      <h2 style="margin-bottom:0">Usage log — every routed request</h2>
      <button class="act" onclick="clearLog('usage','usage log entries')"
        ${reqs.length ? "" : "disabled"}>Clear usage log</button>
    </div>
    <p class="hint">The <b>model(s)</b> column is who answered; the <b>tools (MCP)</b> column is which of
      Foundry's own MCP servers that request exercised — expand a badge for the per-call trail. A
      <b>direct · client tools</b> row bypassed Foundry's tools entirely.</p>
    <table><tr><th>time (UTC)</th><th>persona</th><th>mode</th><th>request</th>
    <th>model(s)</th><th>tools (MCP)</th><th>steps</th><th>time</th><th>cost</th><th>guard</th><th>status</th><th title="Rate this response — feeds the insight digest and per-persona quality trends">rate</th></tr>${rows}</table>`;
}

// Thumbs feedback from the Usage tab (quality tracking Phase 1). Re-render so
// the highlighted state reflects what the server now has on record.
async function sendFeedback(requestLogId, rating) {
  try {
    await api("feedback", {method: "POST", body: {request_log_id: requestLogId, rating}});
    toast(rating > 0 ? "Recorded 👍" : "Recorded 👎");
    render();
  } catch (e) { toast(e.message, true); }
}

/* ---------------------------------------------------------------- events -- */
async function tabEvents() {
  const d = await api("events?limit=200");
  const rows = d.events.map(e => `<tr>
    <td class="mono nw">${esc((e.ts || "").slice(0, 19))}</td>
    <td><span class="pill ${e.level === "error" ? "bad" : e.level === "warning" ? "warn" : "ok"}">${esc(e.level)}</span></td>
    <td class="nw">${esc(e.source)}</td><td>${esc(e.message)}</td>
    <td><details><summary>detail</summary><span class="mono">${esc(e.detail || "")}</span></details></td>
    </tr>`).join("");
  $("#main").innerHTML = `
    <div class="row" style="justify-content:space-between;align-items:baseline">
      <h2 style="margin-bottom:0">Troubleshooting log — “why did it route weirdly” (§4.9 item 7)</h2>
      <button class="act" onclick="clearLog('events','event log entries')"
        ${d.events.length ? "" : "disabled"}>Clear event log</button>
    </div>
    <table><tr><th>time (UTC)</th><th>level</th><th>source</th><th>message</th><th></th></tr>${rows}</table>`;
}

/* ------------------------------------------------------- theme + branding -- */
function applyTheme(t) {
  document.documentElement.dataset.theme = t;          // "light" | "dark"
  localStorage.setItem("fr-theme", t);
  const b = $("#theme-btn");
  if (b) b.textContent = t === "light" ? "🌙 Dark" : "☀ Light";
}
function initTheme() {
  // Dark is the default; honor a remembered choice, else the OS preference.
  const saved = localStorage.getItem("fr-theme");
  const osLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
  applyTheme(saved || (osLight ? "light" : "dark"));
  $("#theme-btn").onclick = () =>
    applyTheme(document.documentElement.dataset.theme === "light" ? "dark" : "light");
}

function setLogo(dataUri) {
  const img = $("#brand-logo"), clear = $("#logo-clear");
  if (dataUri) { img.src = dataUri; img.hidden = false; clear.hidden = false; }
  else { img.removeAttribute("src"); img.hidden = true; clear.hidden = true; }
}
async function initBranding() {
  try { const b = await api("branding"); setLogo(b.logo); } catch (e) { /* non-fatal */ }
  $("#logo-btn").onclick = () => $("#logo-file").click();
  $("#logo-file").onchange = e => {
    const f = e.target.files[0]; e.target.value = "";
    if (!f) return;
    if (f.size > 512 * 1024) { toast("Logo must be under 512 KB", true); return; }
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        await api("branding/logo", {method: "POST", body: {logo: reader.result}});
        setLogo(reader.result); toast("Logo updated");
      } catch (err) { toast(err.message, true); }
    };
    reader.readAsDataURL(f);
  };
  $("#logo-clear").onclick = async () => {
    try { await api("branding/logo", {method: "POST", body: {logo: null}}); setLogo(null); toast("Logo cleared"); }
    catch (e) { toast(e.message, true); }
  };
}

/* ----------------------------------------------------------------- devlog -- */
async function tabDevLog() {
  clearInterval(window._devTimer);
  $("#main").innerHTML = `
    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:baseline">
        <h2 style="margin-top:0;margin-bottom:0">Insight digest — quality & reliability patterns</h2>
        <span class="row" style="gap:6px">
          <select id="ins-days"><option value="1">last 24h</option>
            <option value="7" selected>last 7 days</option>
            <option value="30">last 30 days</option></select>
          <button class="act primary" id="ins-run">Generate</button>
        </span>
      </div>
      <p class="hint">Statistical summary per persona: feedback trends, recurring guardrail/error
        types, tool-call reliability by caller model, review-pass outcomes. Numbers only —
        you decide what to act on; low-sample figures are flagged.</p>
      <pre id="ins-report" class="mono" style="white-space:pre-wrap;display:none"></pre>
    </div>
    <div class="row" style="justify-content:space-between;align-items:baseline">
      <h2 style="margin-bottom:0">Dev log — application logs & tracebacks</h2>
      <button class="act" id="dev-clear">Clear</button>
    </div>
    <p class="hint">Captured live from the app's logging (last ~800 records, in memory —
      resets on restart). Errors include full tracebacks. Persistent routing/MCP history
      is in the <b>Events</b> tab.</p>
    <div class="row">
      <label>min level</label>
      <select id="dev-level"><option value="">all</option><option>INFO</option>
        <option>WARNING</option><option>ERROR</option></select>
      <input id="dev-q" size="30" placeholder="search message / logger / traceback…">
      <label title="Auto-refresh every 2s, newest on top">live tail</label>
      <input type="checkbox" id="dev-live">
      <span id="dev-count" class="hint"></span>
    </div>
    <div id="dev-list"></div>`;
  let after = 0;
  const seen = new Map();                       // id -> record (accumulate + dedupe)
  const list = $("#dev-list");
  const levelCls = l => (l === "ERROR" || l === "CRITICAL") ? "bad" : l === "WARNING" ? "warn" : "ok";
  const renderAll = () => {
    const recs = [...seen.values()].sort((a, b) => b.id - a.id);   // newest first
    list.innerHTML = recs.map(e => `<div class="dev-rec">
      <span class="mono nw" style="color:var(--dim)">${esc(e.ts)}</span>
      <span class="pill ${levelCls(e.level)}">${esc(e.level)}</span>
      <span class="mono nw" style="color:var(--dim)">${esc(e.logger)}</span>
      <span>${esc(e.message)}</span>
      ${e.traceback ? `<details><summary>traceback</summary><pre class="mono">${esc(e.traceback)}</pre></details>` : ""}
    </div>`).join("") || '<p class="hint">no matching log records</p>';
    $("#dev-count").textContent = recs.length + " shown";
  };
  const poll = async reset => {
    if (reset) { seen.clear(); after = 0; }
    const level = $("#dev-level").value, q = $("#dev-q").value.trim();
    const d = await api(`devlog?after=${after}&level=${encodeURIComponent(level)}&q=${encodeURIComponent(q)}`);
    for (const e of d.records) seen.set(e.id, e);
    after = Math.max(after, d.max_id || after);
    renderAll();
  };
  $("#ins-run").onclick = async () => {
    const pre = $("#ins-report");
    pre.style.display = "block"; pre.textContent = "generating…";
    try {
      const d = await api(`insights?days=${$("#ins-days").value}`);
      pre.textContent = d.report;
    } catch (e) { pre.textContent = "digest failed: " + e.message; }
  };
  $("#dev-level").onchange = () => poll(true).catch(e => toast(e.message, true));
  $("#dev-q").oninput = debounce(() => poll(true).catch(() => {}), 300);
  $("#dev-clear").onclick = async () => {
    try { await api("devlog/clear", {method: "POST"}); poll(true); } catch (e) { toast(e.message, true); }
  };
  $("#dev-live").onchange = () => {
    clearInterval(window._devTimer);
    if ($("#dev-live").checked)
      window._devTimer = setInterval(() => {
        if (current !== "Dev Log") { clearInterval(window._devTimer); return; }
        poll(false).catch(() => {});
      }, 2000);
  };
  await poll(true);
}

initTheme();
initBranding();
render();
</script>
</body>
</html>
