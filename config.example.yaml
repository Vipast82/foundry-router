# =============================================================================
# Foundry Router — reference configuration.
# Copy to /config/config.yaml (the container does this automatically on first
# start if no config exists) and edit for your deployment.
#
# ${VAR} values are expanded from the container environment / .env at load time.
# Secrets belong in .env, never in this file.
#
# INTERNAL-USE-ONLY: this service has no authentication. Run it on a private
# network. See README.
#
# Active values below are the reference deployment from the design doc §5:
# TrueNAS Ollama (4060 Ti pair) + RTX 3050 mini-PC Ollama + Meridian, with the
# brain on the 3050. Someone with different hardware edits ONLY this file.
# =============================================================================

server:
  host: "0.0.0.0"        # inside Docker keep 0.0.0.0; compose controls exposure
  port: 11435

# --- §4.2 Agent Brain --------------------------------------------------------
# The model that makes routing decisions, on EVERY request. An explicit,
# swappable choice. Reference default: local Ornith-9B on the 3050 node —
# routing stays free. Choosing provider meridian/openrouter makes every routing
# decision a paid call (see design doc §4.2 for why that inversion matters).
agent_brain:
  provider: "ollama"               # "ollama" | "meridian" | "openrouter"
  endpoint: "http://192.168.1.60:11434"   # EDIT: the 3050 mini-PC's Ollama
  model: "ornith:9b-q4_K_M"
  keep_alive: -1                   # keep the brain permanently resident (§5)
  api_key: ""                      # only for meridian/openrouter providers
  max_tokens: 4096
  options:                         # passed through to the brain's backend
    temperature: 0.1               # routing should be boring and deterministic
    # num_ctx: 6144                # set explicitly if the brain host is VRAM-tight

  # --- context-budget knobs (editable LIVE in the web UI, Backends tab) -----
  # Size these to the brain's real headroom. Example: a 6GB local brain at
  # num_ctx 6144 has only ~1500 tokens free after the system prompt + tool
  # schemas — a 22k-char tool result silently truncates the conversation
  # (dropping the user's message!) instead of erroring. These limits cap only
  # the PREVIEW the brain sees to decide what to do next; the full untruncated
  # tool output still reaches the user via return_to_user(use_last_result).
  # A Claude-class brain (provider: meridian/openrouter) can take 20000+.
  tool_result_limit_chars: 2000    # per tool result fed back into the brain
  mcp_result_limit_chars: 2000     # same, for MCP tool results
  worker_max_tokens: 8192          # output budget for worker-model calls
  # Input-side twin of tool_result_limit_chars: what the brain sees of a large
  # pasted user message (file/code) before routing. The dispatched worker
  # still receives the COMPLETE original (ask_* include_full_user_message).
  user_input_preview_chars: 2000
  # Streaming keep-alive: while a worker/brain/MCP call is in flight, emit a
  # "still working" narration line every N seconds — reverse proxies (NPM)
  # and clients close idle connections long before a failover-then-cold-load
  # chain finishes (seen live: 422s to a real answer, client gone at ~300s);
  # flowing bytes reset their idle clocks. 0 disables.
  heartbeat_seconds: 25

  # -- provider: meridian example --
  # provider: "meridian"
  # endpoint: "http://localhost:3456"
  # model: "claude-haiku-4-5"      # a fast/cheap tier, not Opus/Fable
  # api_key: "${MERIDIAN_API_KEY}"

  # -- provider: openrouter example --
  # provider: "openrouter"
  # endpoint: "https://openrouter.ai/api/v1"
  # model: "some/fast-cheap-model"
  # api_key: "${OPENROUTER_API_KEY}"

# --- §4.3 Backend Pool -------------------------------------------------------
backend_pool:
  mode: "internal"                 # "internal" | "olla" | "litellm"

  # Health checking / failover knobs (internal mode). Tool Sync's removal
  # grace period is tied to these same values (§4.2) — a backend must be
  # unhealthy (failure_threshold consecutive failures) before its tools are
  # delisted, so a momentary blip doesn't cause tool-set flapping.
  health_check_interval_seconds: 15
  failure_threshold: 3
  cooldown_seconds: 60
  request_timeout_seconds: 300     # generation calls can be slow on local GPUs

  internal:
    backends:
      # `type` is REQUIRED — it selects the wire protocol (three different ones).
      - name: truenas-ollama
        type: ollama
        url: http://192.168.1.50:11434      # EDIT: TrueNAS Ollama (4060 Ti pair)
        priority: 100
      - name: mini-pc-ollama
        type: ollama
        url: http://192.168.1.60:11434      # EDIT: RTX 3050 mini-PC Ollama
        priority: 90
      - name: meridian
        type: anthropic-compatible
        url: http://192.168.1.40:3456       # EDIT: Meridian bridge
        api_key: "${MERIDIAN_API_KEY}"
        priority: 100
        # Discovery is attempted first for EVERY backend (§4.3). Only if
        # Meridian exposes no model-list endpoint does this fallback list get
        # used. Do not add it unless discovery genuinely returns nothing.
        # models:
        #   - claude-sonnet-5
        #   - claude-opus-4-8
      # - name: openrouter                  # optional — uncomment when connected
      #   type: openai-compatible
      #   url: https://openrouter.ai/api/v1
      #   api_key: "${OPENROUTER_API_KEY}"
      #   priority: 100

  # mode: olla — forward model resolution to an existing Olla instance
  olla:
    url: http://localhost:40114

  # mode: litellm — forward model resolution to an existing LiteLLM proxy
  litellm:
    url: http://localhost:4000
    api_key: "${LITELLM_KEY}"

# --- §4.7 Guardrails ---------------------------------------------------------
guardrails:
  # "internal": Foundry always enforces its own policies (recommended — they
  #   encode usage-window and persona policy Olla/LiteLLM have no concept of).
  # "defer_to_pool": skip spend/rate enforcement, trust LiteLLM/Olla budgets.
  #   Only meaningful with mode: olla/litellm; inert under mode: internal.
  authority: "internal"
  max_steps_per_request: 12        # hard stop on the agent loop
  max_paid_calls_per_request: 3    # Claude/metered calls per single request
  daily_spend_cap_usd: null        # null = no cap; applies to metered backends only
  weekly_spend_cap_usd: null

# --- §4.7 Meridian usage-window awareness ------------------------------------
meridian:
  # Real per-profile usage data (5-hour + weekly buckets), authenticated with
  # the backend's api_key. Queried before committing to any Claude call,
  # shown in the UI (Usage Log tab), and fed into adaptive tier selection.
  quota_path: "/v1/usage/quota"
  # Below this fraction of a window remaining, Claude routing is hard-stopped
  # and the router falls back to local with a <think> note.
  min_window_fraction: 0.05
  # Adaptive conservation: as windows fill, progressively deny more expensive
  # Claude tiers (all live-editable in the Guardrails tab). Tier ladder:
  # Haiku(1) < Sonnet(2) < Opus(3) < Fable/Mythos(4). Fable is split from
  # Opus deliberately — Opus covers most hard coding/debugging, while Fable
  # draws its OWN weekly bucket (~50% of plan usage) and is rarely needed.
  conserve_premium_at: 0.7         # general window >=70%: deny Opus and above
  conserve_strong_at: 0.85         # general window >=85%: deny Sonnet too (Haiku/local only)
  conserve_fable_at: 0.8           # FABLE bucket >=80%: deny Fable, point the brain at Opus
  # Purchased usage credits (if enabled on the plan) kick in when windows
  # exhaust. "last_resort": first Claude attempt after exhaustion is denied
  # with "try local first"; an insistent retry is permitted and logged as
  # spending credits. "never": exhaustion is a hard stop.
  usage_credits: "last_resort"
  # Active oauth-staleness watch: poll the quota endpoint (free, read-only)
  # this often. Meridian's sources.oauth has silently gone null twice —
  # usage figures drift with no error anywhere until someone compares numbers
  # with the Claude app. The poll raises an Events alert + Usage Log banner
  # the moment it flips; fix is manual (meridian profile login <profile>
  # --headless). 0 disables.
  quota_poll_seconds: 180

# --- §4.4 Model Registry & Research Agent --------------------------------------
registry:
  openrouter_poll_hours: 24        # structured metadata poll (no key required)
  research:
    enabled: true
    sweep_hours: 24                # scheduled staleness sweep cadence (§7 open question — daily default)
    stale_days: 14                 # registry rows older than this get re-researched
    max_pages_per_model: 8         # Crawl4AI fetch attempts per model (ranked best-first, early-stops at corpus cap)
    corpus_char_limit: 24000       # extraction-LLM context ceiling; raise only with a bigger research model
    # Prepended to every research search. Its point is SearXNG "bang" engine
    # selection: pin reliable engines and EXCLUDE ones that wall scraping —
    # Brave (429 suspensions) and DuckDuckGo (CAPTCHA). Empty = SearXNG defaults.
    search_prefix: ""              # e.g. "!google !bing !startpage"
    # Model used by the Research Agent. null = reuse the agent_brain model.
    # §7 open question: a larger off-hot-path model may extract scores better.
    model: null
    # Which MCP tools implement search/fetch. Names vary by server build —
    # adjust to match what your SearXNG / Crawl4AI MCP servers actually expose
    # (check the Tools tab in the web UI after connecting them).
    search:  { server: "searxng",  tool: "searxng_web_search", query_param: "query" }
    fetch:   { server: "crawl4ai", tool: "md",                 url_param: "url" }
    # NOTE: SearXNG pacing / 429-backoff now lives on the MCP server connection
    # (mcp_servers[].pace_seconds / rate_limit_*), so it covers the worker-side
    # tool loop and the brain's tool calls too — not just this sweep. See below.

# --- MCP server connections (§4.9 item 8) --------------------------------------
# A CONNECTION list, not a tool list — tools are discovered per server via
# Tool Sync once a connection exists. Reused from the existing MCP fleet.
# Auth: set a server's token in the WEB UI (MCP tab) — it's stored in the DB,
# not here, so you don't have to edit this file to add auth. (A static `headers`
# map below still works too; the UI token merges over it.)
mcp_servers: []
#  - name: searxng
#    url: http://192.168.1.40:8971/mcp
#    transport: streamable-http    # "streamable-http" | "sse"
#    # SearXNG fans each query out to external engines that 429 a burst. These
#    # apply to EVERY caller of this server (research sweep, worker tool loop,
#    # brain tool calls). pace_seconds spaces calls; a 429 gets an escalating
#    # backoff before retry. 429-backoff is on by default even without pacing.
#    pace_seconds: 2.0
#    rate_limit_retries: 6
#    rate_limit_backoff_seconds: 45.0
#  - name: crawl4ai
#    url: http://192.168.1.40:8972/mcp
#    transport: streamable-http
#
#  Code execution sandbox (Code Sandbox MCP) — the ONLY tool that runs arbitrary
#  code, so it is the highest-risk entry in this file. It registers exactly like
#  any other server; the only extra switches are `executes_code` and
#  `call_defaults`. Run it on the SAME host as your other MCP workloads
#  (general-ai), never on a host holding live cloud credentials. Enable it
#  per-persona via the persona editor's "preferred MCP servers" checkbox — it is
#  OFF for every persona until you check it. Hard containment (fork-bomb kill,
#  memory cap, filesystem + network isolation) is enforced by the sandbox
#  CONTAINER on that host — keep the container's --memory/--cpus/--network limits
#  aligned with the values here. See docs/CODE_SANDBOX.md for the containment
#  verification tests to run against the live sandbox.
#  - name: code-sandbox
#    url: http://192.168.0.114:8975/mcp   # general-ai; NOT victor-ai (Meridian OAuth lives there)
#    transport: streamable-http
#    timeout_seconds: 30                  # wall-clock kill Foundry enforces (asyncio.wait_for)
#    executes_code: true                  # full-code audit trail + persona ⚠ badge + these controls
#    call_defaults:                       # force-merged OVER the model's args (config wins)
#      network: false                     # a model cannot enable network itself
#      cpus: 1
#      memory_mb: 512
#  A SECOND instance (e.g. one allowed network for a specific persona) is just
#  another entry on a different port — no code change:
#  - name: code-sandbox-net
#    url: http://192.168.0.114:8976/mcp
#    transport: streamable-http
#    timeout_seconds: 60
#    executes_code: true
#    call_defaults: {network: true, cpus: 2, memory_mb: 1024}
#
#  Media generation (see contrib/mcp-wrappers/README.md) — set generous
#  per-server timeouts; generation runs far longer than a text tool call:
#  - name: comfyui                 # community server, e.g. joenorton/comfyui-mcp-server
#    url: http://192.168.1.40:8188/mcp
#    transport: streamable-http
#    timeout_seconds: 900
#  - name: voicebox                # ships its own /mcp endpoint
#    url: http://192.168.1.40:5001/mcp
#    transport: streamable-http
#    timeout_seconds: 300
#  - name: acestep                 # contrib/mcp-wrappers/acestep_mcp.py
#    url: http://192.168.1.40:8765/mcp
#    transport: streamable-http
#    timeout_seconds: 900
#  - name: chatterbox              # contrib/mcp-wrappers/chatterbox_mcp.py
#    url: http://192.168.1.40:8766/mcp
#    transport: streamable-http
#    timeout_seconds: 300

# --- Tool Sync (§4.2) ----------------------------------------------------------
tool_sync:
  periodic_seconds: 300            # fallback sweep; health-change events also trigger immediate sync

# --- Semantic cache (quality spec Phase 3) --------------------------------------
# Repeated-question shortcut: a sufficiently-similar single-turn question serves
# the stored answer (visibly ⚡-badged) instead of re-routing. The embedding
# source is a setting, not hardcoded — point it at whichever host serves your
# embedding model. Everything here is live-editable in the GUI (Guardrails tab).
semantic_cache:
  enabled: false
  embed_url: ""                    # Ollama-compatible /api/embed host, e.g. http://192.168.1.40:11434
  embed_model: ""                  # e.g. nomic-embed-text
  min_similarity: 0.92             # cosine bar for a hit — higher = stricter
  default_ttl_seconds: 604800      # 7 days, for categories not listed below
  category_ttls:                   # persona benchmark_category -> TTL seconds; 0 = bypass
    agentic: 0                     # agent/tool workloads: freshness + side effects beat latency
    tool_calling: 0
    coding: 604800                 # static code-help answers age slowly
    general_chat: 259200
    reasoning: 259200
  max_entries: 2000

logging:
  level: "INFO"
